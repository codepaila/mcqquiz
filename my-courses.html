<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Courses · Quiznosis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --c-ink:#0d0f14; --c-paper:#f5f3ee; --c-white:#fff;
    --c-accent:#e84b2b; --c-blue:#2b7de8; --c-green:#1a9c5b; --c-gold:#c9920a;
    --c-muted:#7a7870; --c-border:#e2dfd8;
  }
  [data-theme="dark"] {
    --c-ink:#e8ecf4; --c-paper:#0e1626; --c-white:#16203a;
    --c-accent:#e0742f; --c-blue:#5b9bf0; --c-green:#4ade80; --c-gold:#e0a93e;
    --c-muted:#6b7794; --c-border:#2a3a5c;
  }
  body { font-family:'Inter',sans-serif; background:var(--c-paper); color:var(--c-ink); }
  .mp-wrap { max-width:980px; margin:0 auto; padding:1.8rem 1.5rem 3rem; }
  .mp-head { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem; margin-bottom:1.4rem; }
  .mp-head h1 { font-size:1.7rem; font-weight:800; }
  .mp-head p { font-size:0.85rem; color:var(--c-muted); margin-top:0.2rem; }
  .view-all {
    display:inline-flex; align-items:center; gap:0.4rem; padding:0.55rem 1.1rem;
    background:var(--c-accent); color:#fff; border-radius:9px; font-size:0.85rem; font-weight:700;
  }
  .mp-tabs { display:flex; gap:0.5rem; margin-bottom:1.2rem; flex-wrap:wrap; }
  .mp-tab {
    padding:0.5rem 1rem; border-radius:8px; border:1.5px solid var(--c-border);
    background:var(--c-white); font-family:inherit; font-size:0.83rem; font-weight:700;
    cursor:pointer; color:var(--c-ink);
  }
  .mp-tab.active { background:var(--c-ink); color:var(--c-paper); border-color:var(--c-ink); }
  .mp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
  .mp-card {
    background:var(--c-white); border:1.5px solid var(--c-border); border-radius:13px;
    padding:1.1rem 1.2rem;
  }
  .mp-card .row1 { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; flex-wrap:wrap; }
  .badge2 { font-size:0.64rem; font-weight:700; padding:0.18rem 0.55rem; border-radius:5px; text-transform:uppercase; }
  .b-active { background:rgba(26,156,91,0.13); color:var(--c-green); }
  .b-pend { background:rgba(201,146,10,0.15); color:var(--c-gold); }
  .b-fail { background:rgba(232,75,43,0.13); color:var(--c-accent); }
  .mp-title { font-size:1rem; font-weight:800; margin-bottom:0.3rem; }
  .mp-meta { font-size:0.76rem; color:var(--c-muted); font-family:'IBM Plex Mono',monospace; }
  .mp-actions { margin-top:0.9rem; }
  .mp-btn {
    display:block; text-align:center; padding:0.5rem; border-radius:8px; font-size:0.8rem;
    font-weight:700; cursor:pointer; border:1.5px solid var(--c-border);
    background:var(--c-white); color:var(--c-ink); text-decoration:none;
  }
  .mp-btn.primary { background:var(--c-accent); color:#fff; border-color:var(--c-accent); }
  .mp-btn:hover { border-color:var(--c-accent); }
  .empty { text-align:center; padding:3.5rem 1rem; color:var(--c-muted); }
  .empty .icon { font-size:2.6rem; margin-bottom:0.7rem; }
  .empty h3 { font-size:1.05rem; font-weight:800; color:var(--c-ink); margin-bottom:0.3rem; }
  .empty .go { display:inline-block; margin-top:0.8rem; padding:0.5rem 1.1rem; background:var(--c-accent); color:#fff; border-radius:8px; font-size:0.82rem; font-weight:700; }
  .loading { display:flex; justify-content:center; padding:3rem; }
  .spinner { width:30px; height:30px; border:3px solid var(--c-border); border-top-color:var(--c-accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>

</head>
<body>
<main>
  <div class="mp-wrap">
    <div class="mp-head">
      <div>
        <h1>📚 My Courses</h1>
        <p>Courses you're enrolled in or have requested.</p>
      </div>
      <a href="courses.html" class="view-all">View all courses →</a>
    </div>
    <div class="mp-tabs" id="tabs">
      <button class="mp-tab active" data-f="all">All</button>
      <button class="mp-tab" data-f="active">Enrolled</button>
      <button class="mp-tab" data-f="pending">Pending</button>
    </div>
    <div id="list"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</main>

<script type="module">
  const { mountHeader, escapeHtml, formatDate, requireAuth } = await import('./assets/components.js');
  const { enrollments } = await import('./assets/api.js');

  await mountHeader('dashboard');
  await requireAuth('login.html');

  let all = [];
  let filter = 'all';

  const isActive  = s => s === 'ACTIVE' || s === 'APPROVED';
  const isPending = s => s === 'PENDING';

  function statusBadge(s) {
    if (isActive(s))  return '<span class="badge2 b-active">Enrolled</span>';
    if (isPending(s)) return '<span class="badge2 b-pend">Pending review</span>';
    if (s === 'REJECTED')  return '<span class="badge2 b-fail">Rejected</span>';
    if (s === 'SUSPENDED') return '<span class="badge2 b-fail">Suspended</span>';
    if (s === 'EXPIRED')   return '<span class="badge2 b-fail">Expired</span>';
    return `<span class="badge2 b-pend">${escapeHtml(s||'')}</span>`;
  }

  function render() {
    const list = document.getElementById('list');
    let rows = all;
    if (filter === 'active')  rows = all.filter(e => isActive(e.status));
    if (filter === 'pending') rows = all.filter(e => isPending(e.status));
    if (!rows.length) {
      list.innerHTML = `<div class="empty"><div class="icon">📚</div>
        <h3>${filter==='all'?'No courses yet':'Nothing here'}</h3>
        <p>You haven't ${filter==='pending'?'requested':'enrolled in'} any courses.</p>
        <a href="courses.html" class="go">Browse courses →</a></div>`;
      return;
    }
    list.innerHTML = `<div class="mp-grid">${rows.map(e => {
      const active = isActive(e.status);
      const expires = e.expires_at ? `Access until ${escapeHtml(formatDate(e.expires_at))}` : '';
      return `
        <div class="mp-card">
          <div class="row1">${statusBadge(e.status)}</div>
          <div class="mp-title">${escapeHtml(e.course_title || 'Course')}</div>
          <div class="mp-meta">${expires || 'Enrolled ' + escapeHtml(formatDate(e.requested_at || e.created_at || ''))}</div>
          <div class="mp-actions">
            <a href="course-detail.html?id=${encodeURIComponent(e.course_id)}" class="mp-btn ${active?'primary':''}">
              ${active ? 'Open course' : 'View course'}
            </a>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  document.getElementById('tabs').addEventListener('click', e => {
    const t = e.target.closest('.mp-tab'); if (!t) return;
    document.querySelectorAll('.mp-tab').forEach(x => x.classList.toggle('active', x === t));
    filter = t.dataset.f;
    render();
  });

  try {
    all = (await enrollments.mine()).data || [];
    render();
  } catch (err) {
    document.getElementById('list').innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><h3>Couldn't load</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
</script>


<!-- Bottom navigation (mobile PWA) -->
<script type="module">
import { mountBottomNav } from '/pwa/pwa-nav.js';
import { getUser } from '/assets/components.js';
(async () => {
  const u = await getUser();
  mountBottomNav('courses', u);
})();
</script>

<script type="module" src="/pwa/pwa.js"></script>
</body>
</html>
