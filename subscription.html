<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plans · Quiznosis</title>
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="pwa/pwa.css">
<style>
  .plans-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; margin-top:24px; }
  .plan { padding:32px 28px; display:flex; flex-direction:column; }
  .plan-tier {
    font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--ink-muted);
  }
  .plan-price {
    font-family:var(--font-display); font-size:3rem; line-height:1;
    margin:12px 0; font-feature-settings:'tnum';
  }
  .plan-features { margin:20px 0; flex:1; list-style:none; }
  .plan-features li { padding:4px 0; color:var(--ink-soft); font-size:0.92rem; }
  .plan-features li::before { content:'— '; color:var(--accent); }
  .current-banner {
    background:var(--accent-soft); padding:22px; border-radius:var(--radius);
    margin-bottom:28px; border-left:3px solid var(--accent);
  }
</style>

<!-- ── PWA ─────────────────────────────────────────────── -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B8531C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E0742F" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quiznosis">
<meta name="application-name" content="Quiznosis">
<meta name="msapplication-TileColor" content="#B8531C">
<meta name="msapplication-TileImage" content="/assets/icons/icon-144x144.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512x512.png">
<!-- iOS splash screens -->
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1242x2688.png">
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-828x1792.png">
<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1125x2436.png">
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1242x2688.png">
<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-750x1334.png">
<link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-640x1136.png">
<!-- ── end PWA ───────────────────────────────────────────── -->
</head>
<body>
<main class="section">
  <div class="container">
    <div class="text-center mb-3">
      <div class="eyebrow">Membership</div>
      <h1 class="display mt-1" style="font-size:2.6rem;">Choose your plan</h1>
      <p class="text-soft mt-1">Start free. Upgrade when you're ready to commit.</p>
    </div>
    <div id="current-zone"></div>
    <div id="plans-zone"><div class="loading"><div class="spinner"></div><p>Loading plans…</p></div></div>
  </div>
</main>

<script type="module">
  import { mountHeader, mountFooter, escapeHtml, formatDate, getUser } from './assets/components.js';
  import { subscription } from './assets/api.js';

  await mountHeader('subscription');
  mountFooter();

  const u = await getUser();
  const currentZone = document.getElementById('current-zone');

  if (u) {
    try {
      const r = await subscription.mine();
      if (r.data) {
        const s = r.data;
        currentZone.innerHTML = `
          <div class="current-banner">
            <div class="eyebrow">Your current plan</div>
            <div class="flex-between mt-1">
              <div><strong style="font-size:1.2rem;">${escapeHtml(s.plan_name)}</strong>
                <span class="badge badge-accent">${escapeHtml(s.tier)}</span></div>
              <div class="text-soft" style="font-size:0.9rem;">Renews ${formatDate(s.end_date)}</div>
            </div>
          </div>`;
      }
    } catch {}
  }

  try {
    const { data: plans } = await subscription.plans();
    const zone = document.getElementById('plans-zone');
    if (!plans.length) {
      zone.innerHTML = `<div class="empty"><h3>No plans available yet</h3><p>Check back soon.</p></div>`;
    } else {
      zone.innerHTML = `<div class="plans-grid">${plans.map(p => {
        const free = parseFloat(p.price) === 0;
        const feat = p.tier === 'FREE'
          ? ['Access to free quizzes', 'Basic dashboard', 'Community support']
          : p.tier === 'BASIC'
            ? ['Access to most quizzes', 'Detailed analytics', 'Community support']
            : ['Access to all quizzes', 'Detailed analytics', 'Priority support'];
        return `
          <div class="card plan">
            <div class="plan-tier">${escapeHtml(p.tier)}</div>
            <h3 class="display mt-1" style="font-size:1.8rem;">${escapeHtml(p.name)}</h3>
            <div class="plan-price">
              ${free ? 'Free' : '₹' + parseFloat(p.price).toFixed(0)}
              ${free ? '' : `<span style="font-size:0.9rem; color:var(--ink-muted); font-family:var(--font-body);">/ ${p.duration_days} days</span>`}
            </div>
            <ul class="plan-features">${feat.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>
            <button class="btn btn-${p.tier === 'PREMIUM' ? 'accent' : 'primary'}" ${!u ? `data-redirect="register.html"` : ''} ${free ? 'disabled' : ''}>
              ${free ? 'Current plan' : 'Choose plan'}
            </button>
          </div>`;
      }).join('')}</div>`;
      zone.querySelectorAll('[data-redirect]').forEach(b =>
        b.addEventListener('click', () => { window.location.href = b.dataset.redirect; }));
    }
  } catch (err) {
    document.getElementById('plans-zone').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
</script>

<!-- PWA install & service worker -->
<script type="module" src="/pwa/pwa.js"></script>
</body>
</html>
