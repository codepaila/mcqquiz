<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign in · Quiznosis</title>
<meta name="telegram-bot-username" content="QuiznosisBot"> <!-- Replace QuiznosisBot with your actual bot username -->
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="pwa/pwa.css">
<style>
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px 20px;
  background: var(--paper);
  border: 1.5px solid var(--paper-edge);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.96rem;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
}
.google-btn:hover {
  border-color: var(--ink-muted);
  background: var(--paper-soft);
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: var(--ink);
}
.google-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.google-btn svg { flex-shrink: 0; }

/* Real Google button rendered by GIS — must stay completely out of the
   document flow and off-screen (not just opacity:0) because Google
   injects its own iframe with intrinsic pixel dimensions that can
   otherwise leak into the layout. Click is forwarded to it from our
   styled .google-btn so every click opens the full account-chooser
   popup instead of the throttled One Tap prompt. */
#google-btn-real {
  position: fixed !important;
  top: -9999px !important;
  left: -9999px !important;
  width: 1px !important;
  height: 1px !important;
  overflow: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

.divider-or {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--ink-muted);
  font-size: 0.82rem;
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 4px 0;
}
.divider-or::before,
.divider-or::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--paper-edge);
}

/* Telegram button */
.telegram-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px 20px;
  background: #2AABEE;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.96rem;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
}
.telegram-btn:hover {
  background: #1e96d3;
  box-shadow: 0 4px 16px rgba(42,171,238,.35);
  text-decoration: none;
  color: #fff;
}
.telegram-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.telegram-btn svg { flex-shrink: 0; }

/* Telegram widget container — the widget is a cross-origin <iframe>
   with FIXED intrinsic pixel dimensions (it does not reflow), so
   stretching it with width:100% distorts the inner SVG and leaves a
   black bleed past the rounded corners. Instead we:
     1. Give the wrapper the exact same full-width box as .google-btn
        (same height, background, border, border-radius).
     2. Center the iframe inside it without stretching.
     3. Clip any overflow with overflow:hidden + matching border-radius
        so no part of the iframe's own background can show outside
        the rounded corners.
   The result is a button-shaped frame around Telegram's real widget,
   matching Google's button exactly in width and height. */
#telegram-widget-wrap {
  width: 100%;
  min-height: 44px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-radius: var(--radius);
  background: #2AABEE;
}
#telegram-widget-wrap iframe {
  display: block !important;
  border: none !important;
  /* Do NOT force width:100% — let Telegram render its native size,
     centered inside our fixed-height, full-width, clipped wrapper. */
}

.telegram-error {
  color: #dc3545;
  font-size: 0.85rem;
  text-align: center;
  padding: 8px;
  background: rgba(220, 53, 69, 0.1);
  border-radius: 6px;
  margin-top: 4px;
}

.alert-warning {
  background: rgba(255, 193, 7, 0.15);
  border: 1px solid #ffc107;
  color: #856404;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
}
</style>

<body>
<main class="section">
  <div class="container-narrow">
    <div class="text-center mb-3">
      <div class="eyebrow">Welcome back</div>
      <h1 class="display mt-1" style="font-size:2.6rem;">Sign in</h1>
    </div>
    <div class="card" style="padding:32px;">
      <div class="stack" style="--stack:16px;">
        <div id="alert-zone"></div>

        <!-- Google Sign-In — styled button that forwards its click to the
             real (hidden) GIS button below, so every click opens the full
             popup account-chooser, never the throttled One Tap prompt. -->
        <button class="google-btn" id="google-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Continue with Google
        </button>
        <!-- GIS renders the real <div> button inside here -->
        <div id="google-btn-real"></div>

        <!-- Telegram Login Widget (official) -->
        <div id="telegram-widget-wrap" style="margin-bottom:4px;">
          <!-- Widget injected by JS below after bot username is known -->
        </div>
        <div id="telegram-error" style="display:none;" class="telegram-error"></div>

        <div class="divider-or">or</div>

        <!-- Email / password form -->
        <form id="login-form" class="stack" style="--stack:16px;">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
            <div class="text-right" style="margin-top:4px;">
              <a href="forgot.html" style="font-size:0.82rem;">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Sign in</button>
        </form>

        <p class="text-center text-muted" style="font-size:0.9rem;">
          New here? <a href="register.html">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</main>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script type="module">
  import { mountHeader, mountFooter, queryParam, escapeHtml, clearUserCache } from './assets/components.js';
  import { auth } from './assets/api.js';

  await mountHeader('');
  mountFooter();

  const alertZone  = document.getElementById('alert-zone');
  const submitBtn  = document.getElementById('submit-btn');
  const googleBtn  = document.getElementById('google-btn');
  const googleBtnReal = document.getElementById('google-btn-real');
  const telegramWrap = document.getElementById('telegram-widget-wrap');
  const telegramError = document.getElementById('telegram-error');

  // -----------------------------------------------------
  // Public configuration (loaded once)
  // -----------------------------------------------------
  let APP_CONFIG = null;

  async function loadPublicConfig() {
    if (APP_CONFIG) return APP_CONFIG;

    try {
      const response = await fetch('/api/config.php', {
        credentials: 'same-origin',
        cache: 'no-store',
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const result = await response.json();

      // Handle both response formats
      if (result.success) {
        APP_CONFIG = {
          google_client_id: result.google_client_id,
          telegram_bot_username: result.telegram_bot_username,
        };
      } else if (result.ok && result.data) {
        APP_CONFIG = {
          google_client_id: result.data.google_client_id,
          telegram_bot_username: result.data.telegram_bot_username,
        };
      } else {
        throw new Error(result.error || 'Invalid configuration response.');
      }

      return APP_CONFIG;
    } catch (err) {
      console.error('Config load error:', err);
      throw err;
    }
  }

  // --- URL param alerts -----------------------------------------------
  if (queryParam('registered') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Account created! Verify your email, then sign in.</div>`;
  if (queryParam('verified') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Email verified. You can sign in now.</div>`;
  if (queryParam('reset') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Password reset. Sign in with your new password.</div>`;

  // --- Google sign-in --------------------------------------------------
  function handleGoogleCredential(response) {
    alertZone.innerHTML = '';
    googleBtn.disabled = true;
    googleBtn.innerHTML = `<span style="display:inline-block;width:18px;height:18px;border:2px solid var(--paper-edge);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;"></span> Verifying…`;

    auth.googleOAuth(response.credential)
      .then(() => {
        clearUserCache();
        window.location.href = queryParam('next') || 'dashboard.html';
      })
      .catch(err => {
        alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        googleBtn.disabled = false;
        googleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`;
      });
  }

  // --- Initialize Google OAuth ---
  // FIX: We no longer rely on google.accounts.id.prompt() for the click
  // handler. One Tap's prompt() has a built-in cooldown — after the user
  // dismisses it, selects an account once, or it gets auto-cancelled,
  // Google silently suppresses it on subsequent calls in the same
  // browser/session ("not displayed" / "skipped moment"), which is why
  // Google sign-in worked once and then appeared to do nothing.
  //
  // The fix: render Google's real button (GIS renderButton) into a hidden
  // container, then forward every click on our styled button to a
  // synthetic click on the real one. renderButton always opens the full
  // OAuth popup/account-chooser — it is not subject to the One Tap
  // cooldown, so it works reliably on every click, every time.
  async function initGoogleOAuth() {
    try {
      // Wait for Google library to load
      if (!window.google?.accounts?.id) {
        await new Promise((resolve, reject) => {
          let attempts = 0;
          const checkInterval = setInterval(() => {
            attempts++;
            if (window.google?.accounts?.id) {
              clearInterval(checkInterval);
              resolve();
            } else if (attempts > 20) {
              clearInterval(checkInterval);
              reject(new Error('Google Identity Services did not load in time'));
            }
          }, 200);
        });
      }

      const config = await loadPublicConfig();

      if (!config.google_client_id) {
        throw new Error('Google Client ID not configured');
      }

      google.accounts.id.initialize({
        client_id: config.google_client_id,
        callback: handleGoogleCredential,
        cancel_on_tap_outside: false,
        context: 'signin',
        // Disabling FedCM auto-select avoids silent re-use of a previously
        // chosen account without a visible chooser, which can also look
        // like "nothing happens" on a second attempt.
        auto_select: false,
        itp_support: true,
      });

      // Render Google's own button into the hidden container.
      // This is what actually guarantees a popup opens on every click.
      google.accounts.id.renderButton(googleBtnReal, {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        width: 320,
      });

      // Forward clicks from our styled button to the real GIS button.
      googleBtn.addEventListener('click', () => {
        alertZone.innerHTML = '';
        const realButton = googleBtnReal.querySelector('div[role="button"]');
        if (realButton) {
          realButton.click();
        } else {
          // Fallback — real button not ready yet, try prompt as last resort
          google.accounts.id.prompt();
        }
      });

      console.log('Google OAuth initialized successfully');

    } catch (err) {
      console.error('Google OAuth init error:', err);
      googleBtn.style.display = 'none';
      const divider = document.querySelector('.divider-or');
      if (divider) {
        divider.style.display = 'none';
      }
      // Show error in alert zone
      alertZone.innerHTML = `<div class="alert alert-warning">Google Sign-In is currently unavailable. Please use email or Telegram login.</div>`;
    }
  }

  // --- Initialize Telegram Widget ---
  async function initTelegramWidget() {
    try {
      const config = await loadPublicConfig();
      const botUsername = config.telegram_bot_username;

      const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);

      // Check if we're on a valid domain for Telegram
      const isValidDomain = !isLocalhost && location.protocol === 'https:';

      if (!botUsername || botUsername === 'QuiznosisBot') {
        console.warn('Telegram bot username not configured');
        telegramWrap.style.display = 'none';
        telegramError.style.display = 'block';
        telegramError.textContent = 'Telegram login is not configured. Please use email or Google sign-in.';
        return;
      }

      if (!isValidDomain) {
        console.warn('Telegram widget requires HTTPS and non-localhost domain');
        telegramWrap.style.display = 'none';
        telegramError.style.display = 'block';
        telegramError.textContent = '⚠️ Telegram login requires HTTPS. Please use email or Google sign-in.';
        return;
      }

      // Define the auth callback before loading the widget
      window.onTelegramAuth = async function (user) {
        alertZone.innerHTML = '';

        try {
          const response = await fetch('/api/auth/telegram.php', {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(user)
          });

          const data = await response.json();

          if (!response.ok || (!data.ok && !data.success)) {
            throw new Error(data.error || 'Telegram login failed.');
          }

          clearUserCache();
          window.location.href = queryParam('next') || 'dashboard.html';

        } catch (err) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        }
      };

      // Load the Telegram widget script
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', botUsername);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-radius', '8');
      script.setAttribute('data-request-access', 'write');
      script.setAttribute('data-onauth', 'onTelegramAuth(user)');

      // Clear any existing content and append the script
      telegramWrap.innerHTML = '';
      telegramWrap.appendChild(script);

      // Hide error if visible
      telegramError.style.display = 'none';

      console.log('Telegram widget initialized for bot:', botUsername);

    } catch (err) {
      console.error('Telegram init error:', err);
      telegramWrap.style.display = 'none';
      telegramError.style.display = 'block';
      telegramError.textContent = '⚠️ Could not load Telegram login: ' + err.message;
    }
  }

  // --- Initialize everything ---
  try {
    // Load config first
    await loadPublicConfig();

    // Initialize Google OAuth
    await initGoogleOAuth();

    // Initialize Telegram
    await initTelegramWidget();

  } catch (err) {
    console.error('Initialization error:', err);
    alertZone.innerHTML = `<div class="alert alert-warning">Some features may be unavailable. Please try refreshing the page.</div>`;
  }

  // --- Email/password form --------------------------------------------
  let lastEmail = '';
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertZone.innerHTML = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    lastEmail = form.email.value.trim();
    try {
      await auth.login({ email: lastEmail, password: form.password.value });
      clearUserCache();
      window.location.href = queryParam('next') || 'dashboard.html';
    } catch (err) {
      let msg = escapeHtml(err.message);
      if (err.data?.code === 'EMAIL_NOT_VERIFIED') {
        msg += ` — <a href="#" id="resend-link">Resend verification email</a>`;
      }
      alertZone.innerHTML = `<div class="alert alert-error">${msg}</div>`;
      document.getElementById('resend-link')?.addEventListener('click', async (ev) => {
        ev.preventDefault();
        try {
          await auth.resendVerification(lastEmail);
          alertZone.innerHTML = `<div class="alert alert-success">Verification email sent — check your inbox.</div>`;
        } catch (e2) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(e2.message)}</div>`;
        }
      });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>

@keyframes spin { to { transform: rotate(360deg); } }
</style>
