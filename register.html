<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="telegram-bot-username" content="QuiznosisBot"> <!-- Replace with your actual bot username -->
  <title>Register · Quiznosis</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="pwa/pwa.css">
  
  <style>
    /* ── Social Login Buttons ──────────────────────────── */
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 20px;
      background: var(--paper);
      border: 1.5px solid var(--paper-edge);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.96rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      min-height: 48px;
    }
    .social-btn:hover {
      border-color: var(--ink-muted);
      background: var(--paper-soft);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      color: var(--ink);
    }
    .social-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .social-btn svg { flex-shrink: 0; }

    /* Google specific */
    .google-btn {
      background: #fff;
      border-color: #dadce0;
    }
    .google-btn:hover {
      background: #f8f9fa;
      border-color: #c5c7c9;
    }

    /* Telegram button */
    .telegram-btn {
      background: #2AABEE;
      border: none;
      color: #fff;
      font-weight: 600;
    }
    .telegram-btn:hover {
      background: #1e96d3;
      box-shadow: 0 4px 16px rgba(42,171,238,.35);
      color: #fff;
    }

    /* Telegram Widget Wrapper - Full Width Fix */
    #telegram-widget-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    #telegram-widget-wrap iframe {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 100% !important;
      height: 48px !important;
      border-radius: var(--radius) !important;
    }

    .divider-or {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--ink-muted);
      font-size: 0.82rem;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 4px 0;
    }
    .divider-or::before,
    .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--paper-edge);
    }

    .telegram-error {
      color: #dc3545;
      font-size: 0.85rem;
      text-align: center;
      padding: 8px;
      background: rgba(220, 53, 69, 0.1);
      border-radius: 6px;
      margin-top: 4px;
    }

    /* ── Password Strength ── */
    .password-strength {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .password-strength .bars {
      display: flex;
      gap: 4px;
    }
    .password-strength .bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--paper-edge);
      transition: all 0.3s ease;
    }
    .password-strength .bar.active.weak { background: #dc3545; }
    .password-strength .bar.active.fair { background: #ffc107; }
    .password-strength .bar.active.good { background: #17a2b8; }
    .password-strength .bar.active.strong { background: #28a745; }
    .password-strength .bar.active.excellent { background: #20c997; }
    
    .password-strength .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-muted);
      transition: color 0.3s ease;
    }
    .password-strength .label.weak { color: #dc3545; }
    .password-strength .label.fair { color: #ffc107; }
    .password-strength .label.good { color: #17a2b8; }
    .password-strength .label.strong { color: #28a745; }
    .password-strength .label.excellent { color: #20c997; }

    .password-requirements {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      margin-top: 6px;
      font-size: 0.8rem;
    }
    .password-requirements .req {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--ink-muted);
      transition: color 0.3s ease;
    }
    .password-requirements .req.met {
      color: #28a745;
    }
    .password-requirements .req svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Field Row ── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) {
      .field-row {
        grid-template-columns: 1fr;
      }
    }

    /* ── Alert styles ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .alert svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .alert-error {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }
    .alert-success {
      background: rgba(40, 167, 69, 0.1);
      border: 1px solid rgba(40, 167, 69, 0.2);
      color: #28a745;
    }
    .alert-warning {
      background: rgba(255, 193, 7, 0.15);
      border: 1px solid #ffc107;
      color: #856404;
    }

    .field-hint {
      font-size: 0.78rem;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    /* Password toggle button */
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--ink-muted);
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s ease;
    }
    .password-toggle:hover {
      color: var(--ink);
    }

    .field-with-toggle {
      position: relative;
    }
    .field-with-toggle input {
      padding-right: 44px;
    }

    /* Loading spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

<body>
  <main class="section">
    <div class="container-narrow">
      <div class="text-center mb-3">
        <div class="eyebrow">Get started</div>
        <h1 class="display mt-1" style="font-size:2.6rem;">Create your account</h1>
        <p class="text-soft mt-1" style="font-size:0.95rem;">Free forever. Takes 30 seconds.</p>
      </div>
      
      <div class="card" style="padding:32px;">
        <div class="stack" style="--stack:16px;">
          <div id="alert-zone"></div>

          <!-- Google Sign-Up -->
          <button class="social-btn google-btn" id="google-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Sign up with Google
          </button>

          <!-- Telegram Login Widget (Full Width) -->
          <div id="telegram-widget-wrap"></div>
          <div id="telegram-error" style="display:none;" class="telegram-error"></div>

          <div class="divider-or">or sign up with email</div>

          <!-- Email form -->
          <form id="register-form" class="stack" style="--stack:16px;">
            <div class="field-row">
              <div class="field">
                <label for="firstName">First name</label>
                <input id="firstName" name="firstName" required minlength="2" placeholder="e.g. Anjali">
              </div>
              <div class="field">
                <label for="lastName">Last name <span class="text-muted" style="font-weight:400;">(optional)</span></label>
                <input id="lastName" name="lastName" placeholder="e.g. Sharma">
              </div>
            </div>
            
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            
            <!-- Password with strength meter -->
            <div class="field">
              <label for="password">Password</label>
              <div class="field-with-toggle">
                <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
                <button type="button" class="password-toggle" id="toggle-password">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              
              <!-- Password Strength -->
              <div class="password-strength" id="password-strength" style="display: none;">
                <div class="bars">
                  <div class="bar" data-index="0"></div>
                  <div class="bar" data-index="1"></div>
                  <div class="bar" data-index="2"></div>
                  <div class="bar" data-index="3"></div>
                  <div class="bar" data-index="4"></div>
                </div>
                <div class="label" id="strength-label">Weak</div>
              </div>
              
              <!-- Password Requirements -->
              <div class="password-requirements" id="requirements">
                <span class="req" data-req="length">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
                  8+ characters
                </span>
                <span class="req" data-req="uppercase">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
                  Uppercase
                </span>
                <span class="req" data-req="lowercase">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
                  Lowercase
                </span>
                <span class="req" data-req="number">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
                  Number
                </span>
                <span class="req" data-req="special">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
                  Special character
                </span>
              </div>
            </div>
            
            <div class="field">
              <label for="professionId">Preparing for <span class="text-muted" style="font-weight:400;">(optional)</span></label>
              <select id="professionId" name="professionId">
                <option value="">— Choose later —</option>
              </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Create account</button>
          </form>

          <p class="text-center text-muted" style="font-size:0.9rem;">
            Already have an account? <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script type="module">
    import { mountHeader, mountFooter, escapeHtml, clearUserCache, queryParam } from './assets/components.js';
    import { auth, taxonomy } from './assets/api.js';

    await mountHeader('');
    mountFooter();

    const alertZone = document.getElementById('alert-zone');
    const googleBtn = document.getElementById('google-btn');
    const telegramWrap = document.getElementById('telegram-widget-wrap');
    const telegramError = document.getElementById('telegram-error');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('toggle-password');

    // ── Password toggle ──
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.innerHTML = isPassword ? `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      ` : `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      `;
    });

    // ── Password strength checker ──
    const checkPasswordStrength = (password) => {
      const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /\d/.test(password),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(password),
      };
      const score = Object.values(checks).filter(Boolean).length;
      const levels = [
        { label: 'Weak', class: 'weak' },
        { label: 'Weak', class: 'weak' },
        { label: 'Fair', class: 'fair' },
        { label: 'Good', class: 'good' },
        { label: 'Strong', class: 'strong' },
        { label: 'Excellent', class: 'excellent' },
      ];
      return { checks, score, ...levels[score] };
    };

    // ── Update password UI ──
    const updatePasswordUI = () => {
      const password = passwordInput.value;
      const hasPassword = password.length > 0;
      const strengthContainer = document.getElementById('password-strength');
      const strengthLabel = document.getElementById('strength-label');
      const requirements = document.querySelectorAll('.req');
      
      strengthContainer.style.display = hasPassword ? 'flex' : 'none';
      
      if (!hasPassword) {
        requirements.forEach(req => {
          req.classList.remove('met');
          req.querySelector('svg').innerHTML = `
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l2 2"/>
          `;
        });
        return;
      }
      
      const { checks, score, label, class: strengthClass } = checkPasswordStrength(password);
      
      // Update bars
      document.querySelectorAll('.bar').forEach((bar, i) => {
        bar.classList.toggle('active', i < score);
        bar.className = `bar ${i < score ? 'active ' + strengthClass : ''}`;
      });
      
      // Update label
      strengthLabel.textContent = label;
      strengthLabel.className = `label ${strengthClass}`;
      
      // Update requirements
      requirements.forEach(req => {
        const key = req.dataset.req;
        const met = checks[key];
        req.classList.toggle('met', met);
        req.querySelector('svg').innerHTML = met ? `
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l2 2"/>
        ` : `
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l2 2"/>
        `;
      });
    };

    passwordInput.addEventListener('input', updatePasswordUI);
    passwordInput.addEventListener('focus', () => {
      if (passwordInput.value) {
        document.getElementById('password-strength').style.display = 'flex';
      }
    });

    // -----------------------------------------------------
    // Public configuration
    // -----------------------------------------------------
    let APP_CONFIG = null;

    async function loadPublicConfig() {
      if (APP_CONFIG) return APP_CONFIG;

      try {
        const response = await fetch('/api/config.php', {
          credentials: 'same-origin',
          cache: 'no-store',
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const result = await response.json();

        if (result.success) {
          APP_CONFIG = {
            google_client_id: result.google_client_id,
            telegram_bot_username: result.telegram_bot_username,
          };
        } else if (result.ok && result.data) {
          APP_CONFIG = {
            google_client_id: result.data.google_client_id,
            telegram_bot_username: result.data.telegram_bot_username,
          };
        } else {
          throw new Error(result.error || 'Invalid configuration response.');
        }

        return APP_CONFIG;
      } catch (err) {
        console.error('Config load error:', err);
        throw err;
      }
    }

    // Load professions dropdown
    try {
      const { data: profs } = await taxonomy.professions();
      const sel = document.getElementById('professionId');
      for (const p of profs) {
        const o = document.createElement('option');
        o.value = p.id;
        o.textContent = p.name;
        sel.append(o);
      }
    } catch (err) {
      console.warn('Could not load professions:', err);
    }

    // --- Google sign-up --------------------------------------------------
    function handleGoogleCredential(response) {
      alertZone.innerHTML = '';
      googleBtn.disabled = true;
      googleBtn.innerHTML = `<span style="display:inline-block;width:18px;height:18px;border:2px solid var(--paper-edge);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;"></span> Setting up your account…`;

      auth.googleOAuth(response.credential)
        .then(() => {
          clearUserCache();
          window.location.href = queryParam('next') || 'dashboard.html';
        })
        .catch(err => {
          alertZone.innerHTML = `<div class="alert alert-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            ${escapeHtml(err.message)}
          </div>`;
          googleBtn.disabled = false;
          googleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Sign up with Google`;
        });
    }

    // --- Initialize Google OAuth ---
    async function initGoogleOAuth() {
      try {
        if (!window.google?.accounts?.id) {
          await new Promise((resolve, reject) => {
            let attempts = 0;
            const checkInterval = setInterval(() => {
              attempts++;
              if (window.google?.accounts?.id) {
                clearInterval(checkInterval);
                resolve();
              } else if (attempts > 20) {
                clearInterval(checkInterval);
                reject(new Error('Google Identity Services did not load in time'));
              }
            }, 200);
          });
        }

        const config = await loadPublicConfig();

        if (!config.google_client_id) {
          throw new Error('Google Client ID not configured');
        }

        google.accounts.id.initialize({
          client_id: config.google_client_id,
          callback: handleGoogleCredential,
          cancel_on_tap_outside: false,
          context: 'signup',
        });

        googleBtn.addEventListener('click', () => {
          alertZone.innerHTML = '';
          google.accounts.id.prompt((notification) => {
            if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
              google.accounts.id.prompt();
            }
          });
        });

        console.log('Google OAuth initialized successfully');

      } catch (err) {
        console.error('Google OAuth init error:', err);
        googleBtn.style.display = 'none';
        const divider = document.querySelector('.divider-or');
        if (divider) {
          divider.style.display = 'none';
        }
        alertZone.innerHTML = `<div class="alert alert-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Google Sign-In is currently unavailable. Please use email registration.
        </div>`;
      }
    }

    // --- Initialize Telegram Widget (Full Width) ---
    async function initTelegramWidget() {
      try {
        const config = await loadPublicConfig();
        const botUsername = config.telegram_bot_username;

        const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);
        const isValidDomain = !isLocalhost && location.protocol === 'https:';

        if (!botUsername || botUsername === 'QuiznosisBot') {
          console.warn('Telegram bot username not configured');
          telegramWrap.style.display = 'none';
          telegramError.style.display = 'block';
          telegramError.textContent = 'Telegram login is not configured. Please use email or Google sign-up.';
          return;
        }

        if (!isValidDomain) {
          console.warn('Telegram widget requires HTTPS and non-localhost domain');
          telegramWrap.style.display = 'none';
          telegramError.style.display = 'block';
          telegramError.textContent = '⚠️ Telegram login requires HTTPS. Please use email or Google sign-up.';
          return;
        }

        window.onTelegramAuth = async function (user) {
          alertZone.innerHTML = '';

          try {
            const response = await fetch('/api/auth/telegram.php', {
              method: 'POST',
              credentials: 'include',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(user)
            });

            const data = await response.json();

            if (!response.ok || (!data.ok && !data.success)) {
              throw new Error(data.error || 'Telegram login failed.');
            }

            clearUserCache();
            window.location.href = queryParam('next') || 'dashboard.html';

          } catch (err) {
            alertZone.innerHTML = `<div class="alert alert-error">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              ${escapeHtml(err.message)}
            </div>`;
          }
        };

        // Create wrapper for full width
        const widgetContainer = document.createElement('div');
        widgetContainer.style.width = '100%';
        widgetContainer.style.display = 'flex';
        widgetContainer.style.justifyContent = 'center';

        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.setAttribute('data-telegram-login', botUsername);
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-radius', '8');
        script.setAttribute('data-request-access', 'write');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');

        telegramWrap.innerHTML = '';
        telegramWrap.appendChild(widgetContainer);
        widgetContainer.appendChild(script);

        // Force full width on iframe
        setTimeout(() => {
          const iframe = telegramWrap.querySelector('iframe');
          if (iframe) {
            iframe.style.width = '100% !important';
            iframe.style.maxWidth = '100% !important';
            iframe.style.minWidth = '100% !important';
            iframe.style.height = '48px !important';
          }
        }, 100);

        telegramError.style.display = 'none';
        console.log('Telegram widget initialized for bot:', botUsername);

      } catch (err) {
        console.error('Telegram init error:', err);
        telegramWrap.style.display = 'none';
        telegramError.style.display = 'block';
        telegramError.textContent = '⚠️ Could not load Telegram login: ' + err.message;
      }
    }

    // --- Initialize everything ---
    try {
      await loadPublicConfig();
      await initGoogleOAuth();
      await initTelegramWidget();
    } catch (err) {
      console.error('Initialization error:', err);
      alertZone.innerHTML = `<div class="alert alert-warning">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Some features may be unavailable. Please try refreshing the page.
      </div>`;
    }

    // --- Email registration form ----------------------------------------
    const form = document.getElementById('register-form');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertZone.innerHTML = '';
      
      const password = form.password.value;
      const { score } = checkPasswordStrength(password);
      if (score < 3) {
        alertZone.innerHTML = `<div class="alert alert-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Please choose a stronger password.
        </div>`;
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const r = await auth.register({
          firstName: form.firstName.value.trim(),
          lastName: form.lastName.value.trim() || null,
          email: form.email.value.trim(),
          password: password,
          professionId: form.professionId.value || null,
        });

        alertZone.innerHTML = `<div class="alert alert-success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/>
          </svg>
          ${escapeHtml(r.message || 'Account created.')} Check your email to verify.
        </div>`;
        form.reset();

        setTimeout(() => {
          window.location.href = 'login.html?registered=1';
        }, 2400);

      } catch (err) {
        alertZone.innerHTML = `<div class="alert alert-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          ${escapeHtml(err.message)}
        </div>`;
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>

  <!-- Bottom navigation (mobile PWA) -->
  <script type="module">
    import { mountBottomNav } from '/pwa/pwa-nav.js';
    import { getUser } from '/assets/components.js';
    (async () => {
      const u = await getUser();
      mountBottomNav('register', u);
    })();
  </script>

  <!-- PWA install & service worker -->
  <script type="module" src="/pwa/pwa.js"></script>

</body>
