<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign in · Quiznosis</title>
<meta name="telegram-bot-username" content="quiznosisbot">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="pwa/pwa.css">
<style>
/* ── Global centering fix ── */
html, body {
  min-height: 100vh;
  margin: 0;
  padding: 0;
}

.section {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  margin: 0;
}

.container-narrow {
  max-width: 620px !important;
  width: 100%;
  margin: 0 auto;
  padding: 0;
}

.card {
  padding: 40px 36px !important;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  width: 100%;
  box-sizing: border-box;
}

@media (max-width: 480px) {
  .section {
    padding: 16px;
    align-items: flex-start;
    padding-top: 30px;
  }
  
  .card {
    padding: 28px 20px !important;
  }
  
  .container-narrow {
    padding: 0;
  }
}

/* ── Social Buttons Container ── */
.social-buttons {
  display: flex;
  gap: 12px;
  width: 100%;
  margin-bottom: 4px;
}

.social-buttons .social-item {
  flex: 1;
  min-width: 0;
}

.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 16px;
  background: var(--paper);
  border: 1.5px solid var(--paper-edge);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  min-height: 48px;
  white-space: nowrap;
}

.google-btn:hover {
  border-color: var(--ink-muted);
  background: var(--paper-soft);
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: var(--ink);
  transform: translateY(-1px);
}

.google-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.google-btn svg {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}

.google-btn .btn-text {
  display: inline-block;
}

/* Hide real Google button */
#google-btn-real {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}

/* ── Telegram Widget ── */
#telegram-widget-wrap {
  width: 100%;
  min-height: 48px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
}

#telegram-widget-wrap iframe {
  width: 100% !important;
  max-width: 100% !important;
  min-height: 48px;
  border-radius: 10px !important;
}

.telegram-error {
  color: #dc3545;
  font-size: 0.85rem;
  text-align: center;
  padding: 8px;
  background: rgba(220, 53, 69, 0.1);
  border-radius: 6px;
  margin-top: 4px;
}

/* ── Divider ── */
.divider-or {
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--ink-muted);
  font-size: 0.78rem;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 8px 0 4px;
}

.divider-or::before,
.divider-or::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--paper-edge);
}

/* ── Mobile responsive ── */
@media (max-width: 640px) {
  .social-buttons {
    flex-direction: column;
    gap: 10px;
  }
  
  .social-buttons .social-item {
    flex: none;
    width: 100%;
  }
  
  .google-btn {
    font-size: 0.88rem;
    padding: 11px 14px;
    min-height: 44px;
  }
  
  .google-btn .btn-text {
    font-size: 0.88rem;
  }
  
  #telegram-widget-wrap {
    min-height: 44px;
  }
  
  #telegram-widget-wrap iframe {
    min-height: 44px;
  }
}

/* ── Animations ── */
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Alerts ── */
.alert-warning {
  background: rgba(255, 193, 7, 0.12);
  border: 1px solid #ffc107;
  color: #856404;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.alert-error {
  background: rgba(220, 53, 69, 0.08);
  border: 1px solid rgba(220, 53, 69, 0.25);
  color: #dc3545;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.alert-success {
  background: rgba(40, 167, 69, 0.08);
  border: 1px solid rgba(40, 167, 69, 0.25);
  color: #28a745;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 12px;
}

/* ── Form improvements ── */
.field input,
.field select {
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 0.95rem;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  width: 100%;
  box-sizing: border-box;
}

.field input:focus,
.field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(var(--accent-rgb, 184, 83, 28), 0.12);
}

.btn-primary {
  border-radius: 10px;
  padding: 14px 20px;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.2s ease;
  width: 100%;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(var(--accent-rgb, 184, 83, 28), 0.25);
}

.btn-primary:disabled {
  transform: none;
}

/* ── Typography ── */
.display {
  font-size: 2.4rem !important;
  letter-spacing: -0.02em;
}

.eyebrow {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}

.text-soft {
  color: var(--ink-muted);
  font-size: 0.95rem;
}

.text-center {
  text-align: center;
}

.mb-3 {
  margin-bottom: 24px;
}

.mt-1 {
  margin-top: 4px;
}

.stack {
  display: flex;
  flex-direction: column;
  gap: var(--stack, 16px);
}
</style>

<!-- ── PWA ─────────────────────────────────────────────── -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B8531C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E0742F" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quiznosis">
<meta name="application-name" content="Quiznosis">
<meta name="msapplication-TileColor" content="#B8531C">
<meta name="msapplication-TileImage" content="/assets/icons/icon-144x144.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512x512.png">
</head>
<body>
<main class="section">
  <div class="container-narrow">
    <div class="text-center mb-3">
      <div class="eyebrow">Welcome back</div>
      <h1 class="display mt-1">Sign in</h1>
      <p class="text-soft mt-1">Continue your learning journey</p>
    </div>
    <div class="card">
      <div class="stack" style="--stack:20px;">
        <div id="alert-zone"></div>

        <!-- Social buttons -->
        <div class="social-buttons">
          <div class="social-item">
            <button class="google-btn" id="google-btn" type="button">
              <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              <span class="btn-text">Google</span>
            </button>
            <div id="google-btn-real"></div>
          </div>

          <div class="social-item">
            <div id="telegram-widget-wrap"></div>
            <div id="telegram-error" style="display:none;" class="telegram-error"></div>
          </div>
        </div>

        <div class="divider-or">or</div>

        <!-- Email form -->
        <form id="login-form" class="stack" style="--stack:18px;">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password">
            <div class="text-right" style="margin-top:6px; text-align:right;">
              <a href="forgot.html" style="font-size:0.82rem;">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Sign in</button>
        </form>

        <p class="text-center text-muted" style="font-size:0.9rem; margin-top:4px; text-align:center;">
          New here? <a href="register.html">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</main>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script type="module">
  import { mountHeader, mountFooter, queryParam, escapeHtml, clearUserCache } from './assets/components.js';
  import { auth } from './assets/api.js';

  await mountHeader('');
  mountFooter();

  const alertZone  = document.getElementById('alert-zone');
  const submitBtn  = document.getElementById('submit-btn');
  const googleBtn  = document.getElementById('google-btn');
  const googleBtnReal = document.getElementById('google-btn-real');
  const telegramWrap = document.getElementById('telegram-widget-wrap');
  const telegramError = document.getElementById('telegram-error');

  // -----------------------------------------------------
  // Public configuration (loaded once)
  // -----------------------------------------------------
  let APP_CONFIG = null;

  async function loadPublicConfig() {
    if (APP_CONFIG) return APP_CONFIG;

    try {
      const response = await fetch('/api/config.php', {
        credentials: 'same-origin',
        cache: 'no-store',
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const result = await response.json();

      if (result.success) {
        APP_CONFIG = {
          google_client_id: result.google_client_id,
          telegram_bot_username: result.telegram_bot_username,
        };
      } else if (result.ok && result.data) {
        APP_CONFIG = {
          google_client_id: result.data.google_client_id,
          telegram_bot_username: result.data.telegram_bot_username,
        };
      } else {
        throw new Error(result.error || 'Invalid configuration response.');
      }

      return APP_CONFIG;
    } catch (err) {
      console.error('Config load error:', err);
      throw err;
    }
  }

  // --- URL param alerts -----------------------------------------------
  if (queryParam('registered') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Account created! Verify your email, then sign in.</div>`;
  if (queryParam('verified') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Email verified. You can sign in now.</div>`;
  if (queryParam('reset') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Password reset. Sign in with your new password.</div>`;

  // --- Google sign-in --------------------------------------------------
  function handleGoogleCredential(response) {
    alertZone.innerHTML = '';
    googleBtn.disabled = true;
    googleBtn.innerHTML = `<span style="display:inline-block;width:20px;height:20px;border:2.5px solid var(--paper-edge);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;"></span>`;

    auth.googleOAuth(response.credential)
      .then(() => {
        clearUserCache();
        window.location.href = queryParam('next') || 'dashboard.html';
      })
      .catch(err => {
        alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        googleBtn.disabled = false;
        googleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg><span class="btn-text">Google</span>`;
      });
  }

  // --- Initialize Google OAuth ---
  async function initGoogleOAuth() {
    try {
      if (!window.google?.accounts?.id) {
        await new Promise((resolve, reject) => {
          let attempts = 0;
          const checkInterval = setInterval(() => {
            attempts++;
            if (window.google?.accounts?.id) {
              clearInterval(checkInterval);
              resolve();
            } else if (attempts > 20) {
              clearInterval(checkInterval);
              reject(new Error('Google Identity Services did not load in time'));
            }
          }, 200);
        });
      }

      const config = await loadPublicConfig();

      if (!config.google_client_id) {
        throw new Error('Google Client ID not configured');
      }

      google.accounts.id.initialize({
        client_id: config.google_client_id,
        callback: handleGoogleCredential,
        cancel_on_tap_outside: false,
        context: 'signin',
        auto_select: false,
        itp_support: true,
      });

      google.accounts.id.renderButton(googleBtnReal, {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        width: 280,
      });

      googleBtn.addEventListener('click', () => {
        alertZone.innerHTML = '';
        const realButton = googleBtnReal.querySelector('div[role="button"]');
        if (realButton) {
          realButton.click();
        } else {
          google.accounts.id.prompt();
        }
      });

      console.log('Google OAuth initialized successfully');

    } catch (err) {
      console.error('Google OAuth init error:', err);
      googleBtn.style.display = 'none';
      alertZone.innerHTML = `<div class="alert alert-warning">Google Sign-In is currently unavailable. Please use email or Telegram login.</div>`;
    }
  }

  // --- Initialize Telegram Widget ---
  async function initTelegramWidget() {
    try {
      const config = await loadPublicConfig();
      const botUsername = config.telegram_bot_username;

      const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);
      const isValidDomain = !isLocalhost && location.protocol === 'https:';

      if (!botUsername || botUsername === 'QuiznosisBot') {
        telegramWrap.style.display = 'none';
        telegramError.style.display = 'block';
        telegramError.textContent = 'Telegram login is not configured. Please use email or Google sign-in.';
        return;
      }

      if (!isValidDomain) {
        telegramWrap.style.display = 'none';
        telegramError.style.display = 'block';
        telegramError.textContent = '⚠️ Telegram login requires HTTPS. Please use email or Google sign-in.';
        return;
      }

      window.onTelegramAuth = async function (user) {
        alertZone.innerHTML = '';

        try {
          const response = await fetch('/api/auth/telegram.php', {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(user)
          });

          const data = await response.json();

          if (!response.ok || (!data.ok && !data.success)) {
            throw new Error(data.error || 'Telegram login failed.');
          }

          clearUserCache();
          window.location.href = queryParam('next') || 'dashboard.html';

        } catch (err) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        }
      };

      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', botUsername);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-radius', '10');
      script.setAttribute('data-request-access', 'write');
      script.setAttribute('data-onauth', 'onTelegramAuth(user)');

      telegramWrap.innerHTML = '';
      telegramWrap.appendChild(script);
      telegramError.style.display = 'none';

      console.log('Telegram widget initialized for bot:', botUsername);

    } catch (err) {
      console.error('Telegram init error:', err);
      telegramWrap.style.display = 'none';
      telegramError.style.display = 'block';
      telegramError.textContent = '⚠️ Could not load Telegram login: ' + err.message;
    }
  }

  // --- Initialize everything ---
  try {
    await loadPublicConfig();
    await initGoogleOAuth();
    await initTelegramWidget();
  } catch (err) {
    console.error('Initialization error:', err);
    alertZone.innerHTML = `<div class="alert alert-warning">Some features may be unavailable. Please try refreshing the page.</div>`;
  }

  // --- Email/password form --------------------------------------------
  let lastEmail = '';
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertZone.innerHTML = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    lastEmail = form.email.value.trim();
    try {
      await auth.login({ email: lastEmail, password: form.password.value });
      clearUserCache();
      window.location.href = queryParam('next') || 'dashboard.html';
    } catch (err) {
      let msg = escapeHtml(err.message);
      if (err.data?.code === 'EMAIL_NOT_VERIFIED') {
        msg += ` — <a href="#" id="resend-link">Resend verification email</a>`;
      }
      alertZone.innerHTML = `<div class="alert alert-error">${msg}</div>`;
      document.getElementById('resend-link')?.addEventListener('click', async (ev) => {
        ev.preventDefault();
        try {
          await auth.resendVerification(lastEmail);
          alertZone.innerHTML = `<div class="alert alert-success">Verification email sent — check your inbox.</div>`;
        } catch (e2) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(e2.message)}</div>`;
        }
      });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>

<!-- Bottom navigation (mobile PWA) -->
<script type="module">
import { mountBottomNav } from '/pwa/pwa-nav.js';
import { getUser } from '/assets/components.js';
(async () => {
  const u = await getUser();
  mountBottomNav('login', u);
})();
</script>
<script type="module" src="/pwa/pwa.js"></script>
</body>
</html>
