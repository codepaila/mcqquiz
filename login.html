<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign in · Quiznosis</title>
<meta name="telegram-bot-username" content="QuiznosisBot"> <!-- Replace QuiznosisBot with your actual bot username -->
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="pwa/pwa.css">
<style>
/* ── Social Login Buttons ──────────────────────────── */
.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px 20px;
  background: var(--paper);
  border: 1.5px solid var(--paper-edge);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.96rem;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  min-height: 48px;
}
.social-btn:hover {
  border-color: var(--ink-muted);
  background: var(--paper-soft);
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: var(--ink);
}
.social-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.social-btn svg { flex-shrink: 0; }

/* Google specific */
.google-btn {
  background: #fff;
  border-color: #dadce0;
}
.google-btn:hover {
  background: #f8f9fa;
  border-color: #c5c7c9;
}

/* Telegram button - Custom styled fallback */
.telegram-btn {
  background: #2AABEE;
  border: none;
  color: #fff;
  font-weight: 600;
}
.telegram-btn:hover {
  background: #1e96d3;
  box-shadow: 0 4px 16px rgba(42,171,238,.35);
  color: #fff;
}

/* ── Telegram Widget - Full Width Fix ── */
#telegram-widget-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  min-height: 48px;
}

#telegram-widget-wrap .telegram-login-widget {
  width: 100% !important;
  max-width: 100% !important;
  min-width: 100% !important;
}

#telegram-widget-wrap iframe {
  width: 100% !important;
  max-width: 100% !important;
  min-width: 100% !important;
  height: 48px !important;
  border-radius: var(--radius) !important;
  display: block !important;
}

/* Override Telegram's internal styling */
.telegram-login-container {
  width: 100% !important;
  max-width: 100% !important;
}

.telegram-login-button {
  width: 100% !important;
  max-width: 100% !important;
}

.divider-or {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--ink-muted);
  font-size: 0.82rem;
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 4px 0;
}
.divider-or::before,
.divider-or::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--paper-edge);
}

.telegram-error {
  color: #dc3545;
  font-size: 0.85rem;
  text-align: center;
  padding: 8px;
  background: rgba(220, 53, 69, 0.1);
  border-radius: 6px;
  margin-top: 4px;
}

.alert-warning {
  background: rgba(255, 193, 7, 0.15);
  border: 1px solid #ffc107;
  color: #856404;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
}
</style>

<!-- ── PWA ─────────────────────────────────────────────── -->

<meta name="theme-color" content="#B8531C" media="(prefers-color-scheme: light)">

<body>
<main class="section">
  <div class="container-narrow">
    <div class="text-center mb-3">
      <div class="eyebrow">Welcome back</div>
      <h1 class="display mt-1" style="font-size:2.6rem;">Sign in</h1>
    </div>
    <div class="card" style="padding:32px;">
      <div class="stack" style="--stack:16px;">
        <div id="alert-zone"></div>

        <!-- Google Sign-In -->
        <button class="social-btn google-btn" id="google-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Telegram Login Widget - Full Width -->
        <div id="telegram-widget-wrap"></div>
        <div id="telegram-error" style="display:none;" class="telegram-error"></div>

        <div class="divider-or">or</div>

        <!-- Email / password form -->
        <form id="login-form" class="stack" style="--stack:16px;">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
            <div class="text-right" style="margin-top:4px;">
              <a href="forgot.html" style="font-size:0.82rem;">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Sign in</button>
        </form>

        <p class="text-center text-muted" style="font-size:0.9rem;">
          New here? <a href="register.html">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</main>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script type="module">
  import { mountHeader, mountFooter, queryParam, escapeHtml, clearUserCache } from './assets/components.js';
  import { auth } from './assets/api.js';

  await mountHeader('');
  mountFooter();

  const alertZone  = document.getElementById('alert-zone');
  const submitBtn  = document.getElementById('submit-btn');
  const googleBtn  = document.getElementById('google-btn');
  const telegramWrap = document.getElementById('telegram-widget-wrap');
  const telegramError = document.getElementById('telegram-error');

  // -----------------------------------------------------
  // Public configuration (loaded once)
  // -----------------------------------------------------
  let APP_CONFIG = null;

  async function loadPublicConfig() {
    if (APP_CONFIG) return APP_CONFIG;

    try {
      const response = await fetch('/api/config.php', {
        credentials: 'same-origin',
        cache: 'no-store',
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const result = await response.json();

      if (result.success) {
        APP_CONFIG = {
          google_client_id: result.google_client_id,
          telegram_bot_username: result.telegram_bot_username,
        };
      } else if (result.ok && result.data) {
        APP_CONFIG = {
          google_client_id: result.data.google_client_id,
          telegram_bot_username: result.data.telegram_bot_username,
        };
      } else {
        throw new Error(result.error || 'Invalid configuration response.');
      }

      return APP_CONFIG;
    } catch (err) {
      console.error('Config load error:', err);
      throw err;
    }
  }

  // --- URL param alerts -----------------------------------------------
  if (queryParam('registered') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Account created! Verify your email, then sign in.</div>`;
  if (queryParam('verified') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Email verified. You can sign in now.</div>`;
  if (queryParam('reset') === '1')
    alertZone.innerHTML = `<div class="alert alert-success">Password reset. Sign in with your new password.</div>`;

  // --- Google sign-in --------------------------------------------------
  function handleGoogleCredential(response) {
    alertZone.innerHTML = '';
    googleBtn.disabled = true;
    googleBtn.innerHTML = `<span style="display:inline-block;width:18px;height:18px;border:2px solid var(--paper-edge);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;"></span> Verifying…`;

    auth.googleOAuth(response.credential)
      .then(() => {
        clearUserCache();
        window.location.href = queryParam('next') || 'dashboard.html';
      })
      .catch(err => {
        alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        googleBtn.disabled = false;
        googleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`;
      });
  }

  // --- Initialize Google OAuth ---
  async function initGoogleOAuth() {
    try {
      if (!window.google?.accounts?.id) {
        await new Promise((resolve, reject) => {
          let attempts = 0;
          const checkInterval = setInterval(() => {
            attempts++;
            if (window.google?.accounts?.id) {
              clearInterval(checkInterval);
              resolve();
            } else if (attempts > 20) {
              clearInterval(checkInterval);
              reject(new Error('Google Identity Services did not load in time'));
            }
          }, 200);
        });
      }

      const config = await loadPublicConfig();

      if (!config.google_client_id) {
        throw new Error('Google Client ID not configured');
      }

      google.accounts.id.initialize({
        client_id: config.google_client_id,
        callback: handleGoogleCredential,
        cancel_on_tap_outside: false,
        context: 'signin',
      });

      googleBtn.addEventListener('click', () => {
        alertZone.innerHTML = '';
        google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            google.accounts.id.prompt();
          }
        });
      });

      console.log('Google OAuth initialized successfully');

    } catch (err) {
      console.error('Google OAuth init error:', err);
      googleBtn.style.display = 'none';
      const divider = document.querySelector('.divider-or');
      if (divider) {
        divider.style.display = 'none';
      }
      alertZone.innerHTML = `<div class="alert alert-warning">Google Sign-In is currently unavailable. Please use email or Telegram login.</div>`;
    }
  }

  // --- Initialize Telegram Widget (Full Width Fix) ---
  async function initTelegramWidget() {
    try {
      const config = await loadPublicConfig();
      const botUsername = config.telegram_bot_username;

      const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);
      const isValidDomain = !isLocalhost && location.protocol === 'https:';

      if (!botUsername || botUsername === 'QuiznosisBot') {
        console.warn('Telegram bot username not configured');
        // Show custom styled fallback button
        telegramWrap.innerHTML = `
          <button class="social-btn telegram-btn" disabled style="opacity:0.5;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
              <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
            Continue with Telegram
          </button>
        `;
        telegramError.style.display = 'block';
        telegramError.textContent = 'Telegram login is not configured. Please use email or Google sign-in.';
        return;
      }

      if (!isValidDomain) {
        console.warn('Telegram widget requires HTTPS and non-localhost domain');
        telegramWrap.innerHTML = `
          <button class="social-btn telegram-btn" disabled style="opacity:0.5;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
              <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
            Continue with Telegram (HTTPS Required)
          </button>
        `;
        telegramError.style.display = 'block';
        telegramError.textContent = '⚠️ Telegram login requires HTTPS. Please use email or Google sign-in.';
        return;
      }

      // Define the auth callback
      window.onTelegramAuth = async function (user) {
        alertZone.innerHTML = '';

        try {
          const response = await fetch('/api/auth/telegram.php', {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(user)
          });

          const data = await response.json();

          if (!response.ok || (!data.ok && !data.success)) {
            throw new Error(data.error || 'Telegram login failed.');
          }

          clearUserCache();
          window.location.href = queryParam('next') || 'dashboard.html';

        } catch (err) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        }
      };

      // Clear and set up the widget
      telegramWrap.innerHTML = '';
      
      // Create a wrapper div for the widget
      const widgetContainer = document.createElement('div');
      widgetContainer.style.width = '100%';
      widgetContainer.style.display = 'flex';
      widgetContainer.style.justifyContent = 'center';
      widgetContainer.style.minHeight = '48px';
      
      // Load the Telegram widget script
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', botUsername);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-radius', '8');
      script.setAttribute('data-request-access', 'write');
      script.setAttribute('data-onauth', 'onTelegramAuth(user)');
      
      // Add a unique ID to target with CSS
      script.id = 'telegram-widget-script';

      widgetContainer.appendChild(script);
      telegramWrap.appendChild(widgetContainer);

      // Force full width on the iframe with multiple methods
      const forceFullWidth = () => {
        const iframe = telegramWrap.querySelector('iframe');
        if (iframe) {
          iframe.style.width = '100% !important';
          iframe.style.maxWidth = '100% !important';
          iframe.style.minWidth = '100% !important';
          iframe.style.height = '48px !important';
          iframe.style.display = 'block !important';
          iframe.style.borderRadius = 'var(--radius) !important';
        }
      };

      // Try immediately and after delays
      setTimeout(forceFullWidth, 50);
      setTimeout(forceFullWidth, 200);
      setTimeout(forceFullWidth, 500);

      // Also observe for when the iframe is added
      const observer = new MutationObserver(() => {
        forceFullWidth();
      });
      observer.observe(telegramWrap, { childList: true, subtree: true });

      // Hide error if visible
      telegramError.style.display = 'none';

      console.log('Telegram widget initialized for bot:', botUsername);

    } catch (err) {
      console.error('Telegram init error:', err);
      telegramWrap.innerHTML = `
        <button class="social-btn telegram-btn" disabled style="opacity:0.5;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          Continue with Telegram
        </button>
      `;
      telegramError.style.display = 'block';
      telegramError.textContent = '⚠️ Could not load Telegram login: ' + err.message;
    }
  }

  // --- Initialize everything ---
  try {
    await loadPublicConfig();
    await initGoogleOAuth();
    await initTelegramWidget();
  } catch (err) {
    console.error('Initialization error:', err);
    alertZone.innerHTML = `<div class="alert alert-warning">Some features may be unavailable. Please try refreshing the page.</div>`;
  }

  // --- Email/password form --------------------------------------------
  let lastEmail = '';
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertZone.innerHTML = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    lastEmail = form.email.value.trim();
    try {
      await auth.login({ email: lastEmail, password: form.password.value });
      clearUserCache();
      window.location.href = queryParam('next') || 'dashboard.html';
    } catch (err) {
      let msg = escapeHtml(err.message);
      if (err.data?.code === 'EMAIL_NOT_VERIFIED') {
        msg += ` — <a href="#" id="resend-link">Resend verification email</a>`;
      }
      alertZone.innerHTML = `<div class="alert alert-error">${msg}</div>`;
      document.getElementById('resend-link')?.addEventListener('click', async (ev) => {
        ev.preventDefault();
        try {
          await auth.resendVerification(lastEmail);
          alertZone.innerHTML = `<div class="alert alert-success">Verification email sent — check your inbox.</div>`;
        } catch (e2) {
          alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(e2.message)}</div>`;
        }
      });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<!-- Bottom navigation (mobile PWA) -->
<script type="module">
import { mountBottomNav } from '/pwa/pwa-nav.js';
import { getUser } from '/assets/components.js';
(async () => {
  const u = await getUser();
  mountBottomNav('login', u);
})();
</script>
