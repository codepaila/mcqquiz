<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forgot password · Quiznosis</title>
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="pwa/pwa.css">

<!-- ── PWA ─────────────────────────────────────────────── -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#B8531C" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E0742F" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quiznosis">
<meta name="application-name" content="Quiznosis">
<meta name="msapplication-TileColor" content="#B8531C">
<meta name="msapplication-TileImage" content="/assets/icons/icon-144x144.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512x512.png">
<!-- iOS splash screens -->
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1242x2688.png">
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-828x1792.png">
<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1125x2436.png">
<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/assets/icons/splash-1242x2688.png">
<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-750x1334.png">
<link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/assets/icons/splash-640x1136.png">
<!-- ── end PWA ───────────────────────────────────────────── -->
</head>
<body>
<main class="section">
  <div class="container-narrow">
    <div class="text-center mb-3">
      <div class="eyebrow">Account recovery</div>
      <h1 class="display mt-1" style="font-size:2.4rem;">Reset your password</h1>
      <p class="text-soft mt-1">Enter your email and we'll send a reset link.</p>
    </div>
    <div class="card" style="padding:32px;">
      <form id="forgot-form" class="stack" style="--stack:18px;">
        <div id="alert-zone"></div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Send reset link</button>
        <p class="text-center text-muted" style="font-size:0.9rem;">
          Remembered it? <a href="login.html">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</main>

<script type="module">
  import { mountHeader, mountFooter, escapeHtml } from './assets/components.js';
  import { auth } from './assets/api.js';

  await mountHeader('');
  mountFooter();

  const form = document.getElementById('forgot-form');
  const alertZone = document.getElementById('alert-zone');
  const btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertZone.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      const r = await auth.forgot(form.email.value.trim());
      alertZone.innerHTML = `<div class="alert alert-success">${escapeHtml(r.message)}</div>`;
      btn.textContent = 'Sent ✓';
    } catch (err) {
      alertZone.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });
</script>

<!-- PWA install & service worker -->
<script type="module" src="/pwa/pwa.js"></script>
</body>
</html>
