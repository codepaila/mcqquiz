<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiz · Quiznosis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F3EC; --surface:#FBF8F2; --surface-2:#FFFFFF; --edge:#E4DCCD;
    --ink:#1A1814; --ink-soft:#4A453C; --ink-muted:#8C8473;
    --accent:#B8531C; --accent-hover:#9E4416; --accent-soft:#F3E4D6;
    --correct:#5C7A47; --correct-bg:#E6EBDD; --wrong:#9B2C2C; --wrong-bg:#F2DEDE;
    --warn:#B58413; --opt-bg:#FFFFFF; --opt-edge:#E4DCCD;
    --shadow:0 4px 16px rgba(26,24,20,0.08);
  }
  [data-theme="dark"] {
    --bg:#0E1626; --surface:#16203A; --surface-2:#1B2742; --edge:#2A3A5C;
    --ink:#E8ECF4; --ink-soft:#AEB8CC; --ink-muted:#6B7794;
    --accent:#E0742F; --accent-hover:#F0853E; --accent-soft:#2A2113;
    --correct:#4ADE80; --correct-bg:#16321F; --wrong:#F87171; --wrong-bg:#3A1A1A;
    --warn:#E0A93E; --opt-bg:#1B2742; --opt-edge:#2A3A5C;
    --shadow:0 4px 20px rgba(0,0,0,0.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--ink);
    transition:background 0.2s,color 0.2s; -webkit-font-smoothing:antialiased;
  }
  .topbar {
    display:flex; align-items:center; gap:16px; padding:12px 22px;
    background:var(--surface); border-bottom:1px solid var(--edge);
    position:sticky; top:0; z-index:50;
  }
  .topbar.hidden-fs { display:none; }
  .brand-mark {
    width:34px; height:34px; border-radius:8px; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; flex-shrink:0;
  }
  .set-title { font-weight:600; font-size:1.02rem; line-height:1.2; }
  .set-sub { font-size:0.78rem; color:var(--ink-muted); margin-top:2px; }
  .topbar-stats { display:flex; gap:20px; margin-left:auto; }
  .stat { text-align:center; }
  .stat-num { font-weight:700; font-size:1rem; }
  .stat-label { font-size:0.66rem; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.05em; }
  .timer-box {
    font-family:'JetBrains Mono',monospace; font-weight:600;
    background:var(--accent-soft); color:var(--accent);
    padding:6px 14px; border-radius:8px; font-size:1.05rem;
  }
  .timer-box.low { background:var(--wrong-bg); color:var(--wrong); }
  .btn {
    font-family:inherit; font-size:0.88rem; font-weight:600; padding:8px 16px;
    border-radius:8px; cursor:pointer; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); transition:all 0.13s; white-space:nowrap;
  }
  .btn:hover { border-color:var(--accent); }
  .btn-accent { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-accent:hover { background:var(--accent-hover); border-color:var(--accent-hover); }
  .btn-ghost { background:transparent; }
  .btn-sm { padding:5px 11px; font-size:0.8rem; }
  .btn[disabled] { opacity:0.4; cursor:not-allowed; }
  .icon-btn {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover { border-color:var(--accent); }
  .qa-settings-pop {
    position:fixed; top:64px; right:20px; z-index:250; display:none;
    background:var(--surface); border:1px solid var(--edge); border-radius:12px;
    box-shadow:0 16px 44px rgba(0,0,0,0.22); padding:8px; min-width:250px;
  }
  .qa-settings-pop.open { display:block; }
  .qa-set-row {
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:10px 12px; font-size:0.86rem; font-weight:600;
  }
  .qa-set-row:not(:last-child) { border-bottom:1px solid var(--edge); }
  .qa-set-ctrl { display:flex; align-items:center; gap:8px; }
  .qa-step {
    width:30px; height:30px; border:1.5px solid var(--edge); border-radius:7px;
    background:var(--surface-2); color:var(--ink); font-family:inherit; font-weight:700;
    font-size:0.82rem; cursor:pointer;
  }
  .qa-step:hover { border-color:var(--accent); color:var(--accent); }
  .qa-set-val { min-width:42px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.82rem; }
  .clear-ans {
    background:none; border:none; color:var(--ink-muted); font-family:inherit;
    font-size:0.76rem; font-weight:700; cursor:pointer; text-decoration:underline;
  }
  .clear-ans:hover { color:var(--accent); }
  /* bookmark-icon-btn styles moved to navigator section below */
  .qa-toast-host {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:9000; display:flex; flex-direction:column-reverse; gap:8px; pointer-events:none;
  }
  .qa-toast {
    background:#222; color:#fff; padding:10px 18px; border-radius:8px;
    font-size:0.86rem; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,0.28);
    opacity:0; transform:translateY(8px); transition:opacity .22s,transform .22s;
  }
  .qa-toast.in { opacity:1; transform:translateY(0); }
  .qa-toast.err { background:#b13e2c; }
  /* ===== Layout ===== */
  .layout { display:grid; grid-template-columns:1fr 300px; gap:22px; max-width:1280px; margin:22px auto; padding:0 22px; }
  .layout.fs-wide { grid-template-columns:1fr; max-width:920px; }

  /* Tablet + Mobile: single column, no sidebar */
  @media (max-width:1023px) { .layout { grid-template-columns:1fr; gap:14px; padding:0 14px; } }
  /* Mobile: tighter padding */
  @media (max-width:767px) { .layout { padding:0 12px; margin:12px auto; } }
  .page-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .page-label { font-weight:600; font-size:0.95rem; }
  .progress-track { height:4px; background:var(--edge); border-radius:2px; margin:10px 0 20px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); transition:width 0.3s; }
  .qcard { background:var(--surface); border:1px solid var(--edge); border-radius:12px; padding:22px; margin-bottom:16px; }
  .qcard-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; }
  .qnum { font-weight:700; font-size:0.95rem; }
  .qcard-actions { display:flex; gap:6px; }
  #questions { --qa-fs: 1; }
  .qtext { font-size:calc(1.02rem * var(--qa-fs)); font-weight:500; line-height:1.5; margin-bottom:16px; }
  .opt-text { font-size:calc(0.95rem * var(--qa-fs)); }
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:620px) { .opts { grid-template-columns:1fr; } }
  .opt {
    display:flex; align-items:center; gap:11px; padding:13px 15px;
    border:1px solid var(--opt-edge); background:var(--opt-bg);
    border-radius:9px; cursor:pointer; transition:all 0.12s; font-size:0.92rem;
  }
  .opt:hover { border-color:var(--accent); }
  .opt-radio {
    width:19px; height:19px; border-radius:50%; border:2px solid var(--ink-muted);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .opt-letter { font-weight:600; color:var(--ink-muted); font-size:0.85rem; }
  .opt.selected { border-color:var(--accent); background:var(--accent-soft); }
  .opt.selected .opt-radio { border-color:var(--accent); }
  .opt.selected .opt-radio::after { content:''; width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .opt.selected .opt-letter { color:var(--accent); }
  .opt.correct { border-color:var(--correct); background:var(--correct-bg); }
  .opt.correct .opt-radio { border-color:var(--correct); }
  .opt.correct .opt-letter, .opt.correct .opt-text { color:var(--correct); }
  .opt.correct .opt-radio::after { content:''; width:9px; height:9px; border-radius:50%; background:var(--correct); }
  .opt.wrong { border-color:var(--wrong); background:var(--wrong-bg); }
  .opt.wrong .opt-radio { border-color:var(--wrong); }
  .opt.wrong .opt-letter, .opt.wrong .opt-text { color:var(--wrong); }
  .opt.wrong .opt-radio::after { content:''; width:9px; height:9px; border-radius:50%; background:var(--wrong); }
  .opt.locked { cursor:default; pointer-events:none; }
  .explain-toggle {
    margin-top:12px; color:var(--accent); font-size:0.86rem; font-weight:600;
    cursor:pointer; background:none; border:none; font-family:inherit;
  }
  .explain-box {
    margin-top:10px; padding:13px 15px; background:var(--surface-2);
    border:1px solid var(--edge); border-radius:8px;
    font-size:0.88rem; line-height:1.6; color:var(--ink-soft);
  }
  /* Markdown styles inside any .md-body container */
  .md-body p { margin:0 0 8px; }
  .md-body p:last-child { margin-bottom:0; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
    color:var(--ink); margin:10px 0 6px; line-height:1.3; font-weight:700;
  }
  .md-body h1 { font-size:1.15rem; }
  .md-body h2 { font-size:1.05rem; }
  .md-body h3 { font-size:0.98rem; }
  .md-body h4, .md-body h5, .md-body h6 { font-size:0.9rem; }
  .md-body ul, .md-body ol { margin:6px 0 8px 22px; padding:0; }
  .md-body li { margin:3px 0; }
  .md-body blockquote {
    margin:8px 0; padding:6px 12px; border-left:3px solid var(--accent);
    background:rgba(0,0,0,0.03); color:var(--ink-soft); font-style:italic;
  }
  .md-body blockquote blockquote { margin:6px 0; }
  .md-body code {
    background:rgba(0,0,0,0.06); padding:1px 5px; border-radius:3px;
    font-family:'JetBrains Mono',monospace; font-size:0.85em; color:var(--ink);
  }
  .md-body pre {
    background:#1a1814; color:#f7f3ec; padding:11px 14px; border-radius:6px;
    overflow-x:auto; margin:8px 0; font-size:0.83em;
  }
  .md-body pre code { background:transparent; color:inherit; padding:0; }
  .md-body a { color:var(--accent); text-decoration:underline; }
  .md-body img { max-width:100%; height:auto; border-radius:4px; margin:6px 0; }
  .md-body hr { border:none; border-top:1px solid var(--edge); margin:12px 0; }
  .md-body strong { color:var(--ink); font-weight:700; }
  .md-body del { opacity:0.6; }
  .md-body .md-table-wrap { overflow-x:auto; margin:10px 0; }
  .md-body .md-table {
    border-collapse:collapse; width:100%; font-size:0.85rem; min-width:max-content;
  }
  .md-body .md-table th, .md-body .md-table td {
    border:1px solid var(--edge); padding:6px 10px; text-align:left; vertical-align:top;
  }
  .md-body .md-table th {
    background:var(--surface-2); font-weight:700; color:var(--ink);
  }
  .md-body .md-table tr:nth-child(even) td { background:rgba(0,0,0,0.02); }
  .md-body .md-table-wrap { overflow-x:auto; margin:10px 0; -webkit-overflow-scrolling:touch; }
  .md-body .md-table {
    border-collapse:collapse; width:auto; min-width:60%; font-size:0.86em;
  }
  .md-body .md-table th,
  .md-body .md-table td {
    border:1px solid var(--edge); padding:6px 10px; text-align:left; vertical-align:top;
  }
  .md-body .md-table th { background:rgba(0,0,0,0.04); font-weight:700; color:var(--ink); }
  .md-body .md-table tbody tr:nth-child(even) { background:rgba(0,0,0,0.02); }
  .pager { display:flex; justify-content:center; align-items:center; gap:8px; margin:24px 0 8px; flex-wrap:wrap; }
  .pager-num {
    min-width:36px; height:36px; border-radius:8px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); cursor:pointer; font-weight:600; font-size:0.85rem;
  }
  .pager-num.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .pager-num[disabled] { opacity:0.4; cursor:not-allowed; }
  .navigator { background:var(--surface); border:1px solid var(--edge); border-radius:12px; padding:18px; position:sticky; top:84px; }
  .navigator.hidden-fs { display:none; }
  /* Hide navigator on tablet + mobile — replaced by bottom drawer */
  @media (max-width:1023px) { .navigator { display:none !important; } }
  .nav-title { font-weight:600; margin-bottom:14px; }
  .nav-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .nav-sum-box { text-align:center; padding:9px 4px; border:1px solid var(--edge); border-radius:8px; }
  .nav-sum-num { font-weight:700; font-size:1.1rem; }
  .nav-sum-label { font-size:0.62rem; color:var(--ink-muted); text-transform:uppercase; }
  .nav-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
  .nav-cell {
    aspect-ratio:1; border-radius:6px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); font-size:0.7rem; font-weight:600;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .nav-cell.answered { background:var(--accent); color:#fff; border-color:var(--accent); }
  .nav-cell.marked { box-shadow:0 0 0 2px var(--warn) inset; }
  .nav-cell.current { outline:2px solid var(--accent); outline-offset:1px; }
  .nav-actions { margin-top:16px; display:flex; flex-direction:column; gap:8px; }

  /* ===== Mobile bottom navigation bar ===== */
  .mobile-bottom-nav {
    display:none;
    position:fixed; bottom:0; left:0; right:0; z-index:80;
    background:var(--surface); border-top:1px solid var(--edge);
    padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom));
    gap:8px;
  }
  .mobile-bottom-nav .mob-nav-btn {
    flex:1; height:44px; border-radius:10px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); font-family:inherit;
    font-size:0.88rem; font-weight:600; cursor:pointer; transition:all 0.13s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .mobile-bottom-nav .mob-nav-btn:hover { border-color:var(--accent); }
  .mobile-bottom-nav .mob-nav-btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); }
  .mobile-bottom-nav .mob-nav-btn:disabled { opacity:0.4; cursor:not-allowed; }
  @media (max-width:1023px) {
    .mobile-bottom-nav { display:flex; }
    .layout { padding-bottom:80px; }
    .pager { display:none !important; }
  }

  /* ===== Mobile Overview Drawer ===== */
  .mob-drawer-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.45); opacity:0; transition:opacity 0.25s;
  }
  .mob-drawer-overlay.open { display:block; opacity:1; }
  .mob-drawer {
    position:fixed; bottom:0; left:0; right:0; z-index:201;
    background:var(--surface); border-radius:18px 18px 0 0;
    height:82vh; max-height:82vh;
    transform:translateY(100%); transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
    display:flex; flex-direction:column;
    border-top:1px solid var(--edge);
  }
  .mob-drawer.open { transform:translateY(0); }
  .mob-drawer-handle {
    width:40px; height:4px; border-radius:2px; background:var(--edge);
    margin:10px auto 0; flex-shrink:0;
  }
  .mob-drawer-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px 10px; border-bottom:1px solid var(--edge); flex-shrink:0;
  }
  .mob-drawer-title { font-weight:700; font-size:1rem; }
  .mob-drawer-sub { font-size:0.78rem; color:var(--ink-muted); margin-top:2px; }
  .mob-drawer-close {
    width:32px; height:32px; border-radius:8px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:1rem;
    flex-shrink:0;
  }
  .mob-drawer-body {
    flex:1; overflow-y:auto; padding:14px 18px 24px;
    -webkit-overflow-scrolling:touch;
  }
  .mob-drawer-nav-summary {
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;
  }
  .mob-drawer-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:5px;
  }
  /* 5 columns on larger phones */
  @media (min-width:400px) { .mob-drawer-grid { grid-template-columns:repeat(5,1fr); } }

  /* ===== Mobile header simplification ===== */
  .topbar-mobile-right { display:none; align-items:center; gap:8px; }
  .exam-menu-btn {
    display:flex; align-items:center; justify-content:center;
    width:36px; height:36px;
    border-radius:8px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink);
    font-family:inherit; font-size:1.1rem; font-weight:600; cursor:pointer;
  }
  .exam-menu-btn:hover { border-color:var(--accent); }

  /* Exam menu slide drawer */
  .exam-menu-drawer {
    position:fixed; top:0; right:0; bottom:0; z-index:300;
    width:min(280px, 85vw);
    background:var(--surface); border-left:1px solid var(--edge);
    box-shadow:-8px 0 32px rgba(0,0,0,0.18);
    transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
    display:flex; flex-direction:column;
  }
  .exam-menu-drawer.open { transform:translateX(0); }
  .exam-menu-overlay {
    display:none; position:fixed; inset:0; z-index:299;
    background:rgba(0,0,0,0.4); opacity:0; transition:opacity 0.25s;
  }
  .exam-menu-overlay.open { display:block; opacity:1; }
  .exam-menu-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--edge);
  }
  .exam-menu-head-title { font-weight:700; font-size:0.95rem; }
  .exam-menu-close {
    width:32px; height:32px; border-radius:8px; border:1px solid var(--edge);
    background:var(--surface-2); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:1rem;
  }
  .exam-menu-items { flex:1; overflow-y:auto; padding:10px 8px; }
  .exam-menu-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-radius:10px; margin-bottom:4px;
    cursor:pointer; font-size:0.9rem; font-weight:600;
    transition:background 0.13s;
  }
  .exam-menu-item:hover { background:var(--accent-soft); color:var(--accent); }
  .exam-menu-item.danger { color:var(--wrong); }
  .exam-menu-item.danger:hover { background:var(--wrong-bg); }
  .exam-menu-item-ctrl { display:flex; align-items:center; gap:6px; }
  .exam-menu-item-ctrl .qa-step {
    width:28px; height:28px; border:1.5px solid var(--edge); border-radius:6px;
    background:var(--surface-2); color:var(--ink); font-family:inherit; font-weight:700;
    font-size:0.8rem; cursor:pointer;
  }
  .exam-menu-item-ctrl .qa-step:hover { border-color:var(--accent); color:var(--accent); }
  .exam-menu-item-val { font-family:'JetBrains Mono',monospace; font-size:0.8rem; min-width:36px; text-align:center; }
  .exam-menu-footer { padding:12px 8px; border-top:1px solid var(--edge); }
  .exam-menu-submit-btn {
    width:100%; padding:12px; border-radius:10px; border:none;
    background:var(--accent); color:#fff; font-family:inherit; font-size:0.92rem;
    font-weight:700; cursor:pointer;
  }
  .exam-menu-submit-btn:hover { background:var(--accent-hover); }

  @media (max-width:1023px) {
    /* Hide desktop topbar controls */
    .topbar-stats { display:none; }
    .topbar > .icon-btn,
    .topbar > .btn { display:none !important; }
    .topbar > .timer-box { display:none !important; }
    /* Show mobile right side */
    .topbar-mobile-right { display:flex; margin-left:auto; }
  }

  /* ===== Bookmark & Report button redesign ===== */
  .bookmark-icon-btn {
    width:28px; height:28px; padding:0; cursor:pointer;
    border-radius:8px;
    background:var(--surface-2);
    border:1.5px solid var(--edge);
    color:var(--ink-muted);
    display:inline-flex; align-items:center; justify-content:center;
    transition:border-color .18s, color .18s, transform .15s, box-shadow .2s;
    flex-shrink:0;
  }
  .bookmark-icon-btn:hover {
    border-color:var(--accent);
    color:var(--accent);
    transform:translateY(-1px);
    box-shadow:0 3px 8px rgba(0,0,0,0.09);
  }
  .bookmark-icon-btn:active { transform:translateY(0); }
  .bookmark-icon-btn .bm-svg { transition:transform .25s; }
  /* Active: keep button background, just the SVG path fills with accent */
  .bookmark-icon-btn.on {
    border-color:var(--accent);
    color:var(--accent);
    box-shadow:0 0 0 2px rgba(184,83,28,0.12);
  }

<body>
  <div id="app"><div class="loading-screen"><div class="spinner"></div><p>Loading…</p></div></div>

<script type="module">
  /* ===== Theme (global, persisted via localStorage) ===== */
  const THEME_KEY = 'quiznosis-theme';
  function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch { return 'light'; } }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(THEME_KEY, t); } catch {}
  }
  applyTheme(getTheme());
  function themeIcon() { return getTheme() === 'dark' ? '\u2600' : '\u263e'; }
  function toggleTheme() {
    applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    document.querySelectorAll('[data-theme-btn]').forEach(b => b.textContent = themeIcon());
  }

  const { escapeHtml, queryParam, requireAuth, renderRichText } = await import('./assets/components.js');
  const { quiz, reports, bookmarks } = await import('./assets/api.js');

  await requireAuth('login.html');
  const app = document.getElementById('app');

  const quizSetId = queryParam('quizSetId') || queryParam('id');
  const existingAttemptId = queryParam('attemptId');
  const isBookmarkPractice = queryParam('bookmarks') === '1';

  function fail(msg) {
    app.innerHTML = `<div class="loading-screen"><div class="alert alert-error">${escapeHtml(msg)}</div>
      <a href="quizzes.html" class="btn">\u2190 Back to quizzes</a></div>`;
    throw new Error(msg);
  }

  let setData;
  let attemptId = existingAttemptId || null;
  let resumeData = null;   // set when we're resuming a paused attempt

  async function loadSet(id) { return (await quiz.set({ id })).data; }

  if (existingAttemptId) {
    try {
      const res = await quiz.resume(existingAttemptId);
      resumeData = res.data;
      setData = await loadSet(resumeData.quizSetId);
    } catch (e) { fail('Could not resume this attempt: ' + e.message); }
  } else if (isBookmarkPractice) {
    try { setData = (await bookmarks.practice()).data; }
    catch (e) { fail(e.message || 'No bookmarks to practice yet.'); }
  } else if (quizSetId) {
    try { setData = await loadSet(quizSetId); }
    catch (e) { fail('Could not load quiz: ' + e.message); }
  } else {
    fail('No quiz specified.');
  }

  const items = (setData.items || []).filter(it => it.quiz);
  if (!items.length) fail('This quiz set has no questions.');

  // Pre-load which of these questions the student has already bookmarked, so
  // each card's bookmark icon shows the correct state on first paint.
  const initialBookmarked = new Set();
  try {
    const ids = items.map(it => it.quiz.id);
    const r = await bookmarks.status(ids);
    Object.entries(r.status || {}).forEach(([qid, on]) => { if (on) initialBookmarked.add(qid); });
  } catch {}

  const adminMode = setData.mode === 'PRACTICE' ? 'practice' : 'test';
  const adminNeg  = parseInt(setData.enable_negative_marking || 0) === 1;
  const durationMin = parseInt(setData.duration_minutes || 0) || 0;

  const state = {
    mode: adminMode, negative: adminNeg, perPage: 10, page: 0, fontSize: 1,
    fullscreen: false, responses: {}, started: false, deadline: null,
    runStartedAt: 0, priorElapsed: 0,
  };
  items.forEach(it => {
    state.responses[it.quiz.id] = {
      selected: [], bookmarked: initialBookmarked.has(it.quiz.id), revealed: false,
    };
  });

  // Total seconds spent on this attempt = time before any pause + time in the current run.
  function elapsedSeconds() {
    const thisRun = state.runStartedAt ? Math.floor((Date.now() - state.runStartedAt) / 1000) : 0;
    return state.priorElapsed + thisRun;
  }

  const LETTERS = ['A','B','C','D','E','F'];

  /* ===== Pre-start ===== */
  function renderPrestart() {
    app.innerHTML = `
      <div class="prestart">
        <div class="prestart-card">
          <div class="ps-head">
            <span class="ps-eyebrow">⚙ Configure your session</span>
            <button class="icon-btn" data-theme-btn id="ps-theme">${themeIcon()}</button>
          </div>
          <h1>${escapeHtml(setData.name)}</h1>
          <p class="ps-meta">${items.length} questions ready</p>

          <div class="ps-rows">
            <div class="ps-cfg">
              <div class="ps-cfg-text">
                <div class="ps-cfg-title">Study Mode</div>
                <div class="ps-cfg-sub" id="mode-hint"></div>
              </div>
              <div class="seg" id="seg-mode">
                <div class="seg-opt ${state.mode==='practice'?'on':''}" data-mode="practice">📖 Practice</div>
                <div class="seg-opt ${state.mode==='test'?'on':''}" data-mode="test">⏱ Test</div>
              </div>
            </div>

            <div class="ps-cfg">
              <div class="ps-cfg-text">
                <div class="ps-cfg-title">Negative Marking</div>
                <div class="ps-cfg-sub" id="neg-hint"></div>
              </div>
              <label class="switch">
                <input type="checkbox" id="neg-toggle" ${state.negative?'checked':''}>
                <span class="switch-track"><span class="switch-thumb"></span></span>
              </label>
            </div>
          </div>

          <div class="ps-summary" id="ps-summary"></div>
          <button class="btn btn-accent ps-start" id="start-btn">Start quiz \u2192</button>
        </div>
      </div>`;

    const modeHint = () => {
      document.getElementById('mode-hint').textContent = state.mode === 'practice'
        ? 'No timer — answers and explanations shown as you go.'
        : `Timed exam${durationMin?` (${durationMin} min)`:''} — answers revealed after submission.`;
    };
    const negHint = () => {
      document.getElementById('neg-hint').textContent = state.negative
        ? `\u2212${parseFloat(setData.negative_mark_per_question||0.25)} per wrong answer`
        : 'No penalty for wrong answers';
    };
    const summary = () => {
      const m = state.mode === 'practice' ? '📖 Practice' : '⏱ Test';
      const n = state.negative ? `\u2212${parseFloat(setData.negative_mark_per_question||0.25)}/wrong` : 'No penalty';
      const t = state.mode === 'test' && durationMin ? `${durationMin}m` : 'Untimed';
      document.getElementById('ps-summary').textContent = `${m}  ·  ${n}  ·  ${items.length} Qs  ·  ${t}`;
    };
    modeHint(); negHint(); summary();

    document.getElementById('seg-mode').querySelectorAll('.seg-opt').forEach(o => {
      o.addEventListener('click', () => {
        state.mode = o.dataset.mode;
        document.querySelectorAll('#seg-mode .seg-opt').forEach(x => x.classList.toggle('on', x === o));
        modeHint(); summary();
      });
    });
    document.getElementById('neg-toggle').addEventListener('change', e => { state.negative = e.target.checked; negHint(); summary(); });
    document.getElementById('ps-theme').addEventListener('click', () => { toggleTheme(); renderPrestart(); });
    document.getElementById('start-btn').addEventListener('click', startQuiz);
  }

  async function startQuiz() {
    try {
      // Bookmark Practice sessions are local-only — there's no real quiz set to
      // create an attempt against, so we skip quiz.start and don't persist.
      if (isBookmarkPractice) {
        attemptId = null;
        state.mode = 'practice';
      } else {
        // Tell the server which mode the student chose so answer.php / submit.php
        // honour it instead of always using the quiz set's admin-configured mode.
        const chosenMode = state.mode === 'practice' ? 'PRACTICE' : 'MODEL_TEST';
        if (!attemptId) { attemptId = (await quiz.start(setData.id, chosenMode)).data.id; }
      }
    } catch (e) {
      app.innerHTML = `<div class="prestart"><div class="prestart-card">
        <div class="alert alert-error">${escapeHtml(e.message)}</div>
        <a href="quizzes.html" class="btn" style="margin-top:12px; display:inline-block;">\u2190 Back</a>
      </div></div>`;
      return;
    }
    state.started = true;
    state.runStartedAt = Date.now();
    if (state.mode === 'test' && durationMin > 0) state.deadline = Date.now() + durationMin*60*1000;
    renderQuiz();
    if (state.deadline) startTimer();
  }

  // Pause: save elapsed time on the server, stop the timer, go to the dashboard.
  async function pauseQuiz() {
    if (!attemptId) { window.location.href = 'dashboard.html'; return; }
    const btn = document.getElementById('pause-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Pausing\u2026'; }
    if (timerInt) clearInterval(timerInt);
    try {
      await quiz.pause(attemptId, elapsedSeconds());
      // Pause confirmed — go to the dashboard, where it shows as Resume.
      window.location.href = 'dashboard.html';
    } catch (e) {
      // Don't silently leave — tell the student so the problem is visible.
      if (btn) { btn.disabled = false; btn.textContent = '\u23f8 Pause'; }
      if (timerInt === null && state.deadline) startTimer();
      alert('Could not pause this quiz:\n\n' + (e && e.message ? e.message : e)
        + '\n\nYour answers so far are saved. You can keep going or submit.');
    }
  }

  /* ===== Timer ===== */
  let timerInt = null;
  function startTimer() {
    const tick = () => {
      const box = document.getElementById('timer-box');
      const boxMob = document.getElementById('timer-box-mob');
      if (!box && !boxMob) return;
      const rem = Math.max(0, Math.floor((state.deadline - Date.now())/1000));
      const timeStr = `${String(Math.floor(rem/60)).padStart(2,'0')}:${String(rem%60).padStart(2,'0')}`;
      if (box) { box.textContent = timeStr; box.classList.toggle('low', rem <= 60); }
      if (boxMob) { boxMob.textContent = timeStr; boxMob.classList.toggle('low', rem <= 60); }
      if (rem <= 0) { clearInterval(timerInt); doSubmit(true); }
    };
    tick();
    timerInt = setInterval(tick, 1000);
  }

  function counts() {
    let answered = 0, marked = 0;
    items.forEach(it => {
      const r = state.responses[it.quiz.id];
      if (r.selected.length) answered++;
      if (r.bookmarked) marked++;
    });
    return { answered, marked, unanswered: items.length - answered };
  }

  /* ===== Render quiz ===== */
  function renderQuiz() {
    const totalPages = Math.ceil(items.length / state.perPage);
    const c = counts();
    const fs = state.fullscreen;
    app.innerHTML = `
      <div class="topbar ${fs?'hidden-fs':''}">
        <div class="brand-mark">Q</div>
        <div>
          <div class="set-title">${escapeHtml(setData.name)}</div>
          <div class="set-sub">${items.length} questions \u00b7 ${state.mode==='practice'?'Practice mode':'Test mode'}</div>
        </div>
        <div class="topbar-stats">
          <div class="stat"><div class="stat-num" id="t-answered">${c.answered}</div><div class="stat-label">Answered</div></div>
          <div class="stat"><div class="stat-num" id="t-saved">${c.marked}</div><div class="stat-label">Saved</div></div>
        </div>
        ${state.mode==='test' && state.deadline ? `<div class="timer-box" id="timer-box">--:--</div>` : ''}
        <button class="icon-btn" data-theme-btn id="theme-btn" title="Toggle theme">${themeIcon()}</button>
        <button class="icon-btn" id="settings-btn" title="Quiz settings">\u2699</button>
        <button class="icon-btn" id="fs-btn" title="Fullscreen">\u26f6</button>
        <button class="btn btn-ghost btn-sm" id="pause-btn" title="Pause and resume later">\u23f8 Pause</button>
        <button class="btn btn-accent" id="submit-btn">${state.mode==='practice'?'Finish':'Submit'}</button>
        <!-- Mobile-only right section -->
        <div class="topbar-mobile-right">
          ${state.mode==='test' && state.deadline ? `<div class="timer-box" id="timer-box-mob">--:--</div>` : ''}
          <button class="exam-menu-btn" id="exam-menu-open-btn" title="Exam Menu" aria-label="Exam Menu">&#9776;</button>
        </div>
      </div>
      <!-- Exam Menu Overlay + Drawer (mobile) -->
      <div class="exam-menu-overlay" id="exam-menu-overlay"></div>
      <div class="exam-menu-drawer" id="exam-menu-drawer">
        <div class="exam-menu-head">
          <span class="exam-menu-head-title">Exam Menu</span>
          <button class="exam-menu-close" id="exam-menu-close">\u2715</button>
        </div>
        <div class="exam-menu-items">
          <div class="exam-menu-item" id="em-fullscreen">\u26f6 Fullscreen</div>
          <div class="exam-menu-item" id="em-theme">${themeIcon()} Toggle Theme</div>
          <div class="exam-menu-item" style="cursor:default;">
            <span>Text Size</span>
            <div class="exam-menu-item-ctrl">
              <button class="qa-step" data-efs="-">A\u2212</button>
              <span class="exam-menu-item-val" id="em-fs-val">${Math.round(state.fontSize*100)}%</span>
              <button class="qa-step" data-efs="+">A+</button>
            </div>
          </div>
          <div class="exam-menu-item" style="cursor:default;">
            <span>Per Page</span>
            <div class="exam-menu-item-ctrl">
              <button class="qa-step" data-epp="-">\u2212</button>
              <span class="exam-menu-item-val" id="em-pp-val">${state.perPage}</span>
              <button class="qa-step" data-epp="+">+</button>
            </div>
          </div>
          <div class="exam-menu-item" id="em-pause">\u23f8 Pause Test</div>
        </div>
        <div class="exam-menu-footer">
          <button class="exam-menu-submit-btn" id="em-submit">${state.mode==='practice'?'Finish Practice':'Submit Quiz'}</button>
        </div>
      </div>
      <div class="qa-settings-pop" id="qa-settings-pop">
        <div class="qa-set-row">
          <span>Text size</span>
          <div class="qa-set-ctrl">
            <button class="qa-step" data-fs="-">A\u2212</button>
            <span class="qa-set-val" id="fs-val">${Math.round(state.fontSize*100)}%</span>
            <button class="qa-step" data-fs="+">A+</button>
          </div>
        </div>
        <div class="qa-set-row">
          <span>Questions per page</span>
          <div class="qa-set-ctrl">
            <button class="qa-step" data-pp="-">\u2212</button>
            <span class="qa-set-val" id="pp-val">${state.perPage}</span>
            <button class="qa-step" data-pp="+">+</button>
          </div>
        </div>
      </div>
      <div class="layout ${fs?'fs-wide':''}">
        <main>
          <div class="page-head">
            <div class="page-label" id="page-label">Page ${state.page+1} / ${totalPages}</div>
            ${fs ? `<button class="btn btn-sm" id="exit-fs">Exit fullscreen</button>` : ''}
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${(c.answered/items.length)*100}%"></div></div>
          <div id="questions"></div>
          <div class="pager" id="pager"></div>
        </main>
        <aside class="navigator ${fs?'hidden-fs':''}">
          <div class="nav-title">Navigator</div>
          <div class="nav-summary">
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--wrong)">${c.unanswered}</div><div class="nav-sum-label">Unanswered</div></div>
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--correct)">${c.answered}</div><div class="nav-sum-label">Answered</div></div>
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--accent)">${c.marked}</div><div class="nav-sum-label">Saved</div></div>
          </div>
          <div class="nav-grid" id="nav-grid"></div>
          <div class="nav-actions">
            <button class="btn btn-accent" id="submit-btn-2">${state.mode==='practice'?'Finish practice':'Submit quiz'}</button>
          </div>
        </aside>
      </div>
      <!-- Mobile bottom navigation bar -->
      <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
        <button class="mob-nav-btn" id="mob-prev-btn" ${state.page===0?'disabled':''}>&#8249; Prev</button>
        <button class="mob-nav-btn" id="mob-overview-btn">&#9776; Overview</button>
        <button class="mob-nav-btn ${state.page >= totalPages-1 ? 'accent' : ''}" id="mob-next-btn"
          ${state.page >= totalPages-1 ? '' : ''}>
          ${state.page >= totalPages-1 ? 'Submit' : 'Next ›'}
        </button>
      </nav>
      <!-- Mobile Overview Drawer -->
      <div class="mob-drawer-overlay" id="mob-drawer-overlay"></div>
      <div class="mob-drawer" id="mob-drawer">
        <div class="mob-drawer-handle"></div>
        <div class="mob-drawer-head">
          <div>
            <div class="mob-drawer-title">Question Overview</div>
            <div class="mob-drawer-sub" id="mob-drawer-sub">${c.answered}/${items.length} Attempted</div>
          </div>
          <button class="mob-drawer-close" id="mob-drawer-close">\u2715</button>
        </div>
        <div class="mob-drawer-body">
          <div class="mob-drawer-nav-summary">
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--wrong)" id="mob-unanswered">${c.unanswered}</div><div class="nav-sum-label">Unanswered</div></div>
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--correct)" id="mob-answered">${c.answered}</div><div class="nav-sum-label">Answered</div></div>
            <div class="nav-sum-box"><div class="nav-sum-num" style="color:var(--accent)" id="mob-saved">${c.marked}</div><div class="nav-sum-label">Saved</div></div>
          </div>
          <div class="mob-drawer-grid" id="mob-drawer-grid"></div>
        </div>
      </div>`;
    renderQuestions();
    renderPager(totalPages);
    renderNav();
    renderMobDrawerGrid();
    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('fs-btn').addEventListener('click', enterFullscreen);
    document.getElementById('exit-fs')?.addEventListener('click', exitFullscreen);
    document.getElementById('submit-btn').addEventListener('click', confirmSubmit);
    document.getElementById('submit-btn-2')?.addEventListener('click', confirmSubmit);
    document.getElementById('pause-btn')?.addEventListener('click', pauseQuiz);

    // Settings popover — text size + questions per page
    const setBtn = document.getElementById('settings-btn');
    const setPop = document.getElementById('qa-settings-pop');
    if (setBtn && setPop) {
      setBtn.addEventListener('click', e => { e.stopPropagation(); setPop.classList.toggle('open'); });
      document.addEventListener('click', e => {
        if (!setPop.contains(e.target) && !setBtn.contains(e.target)) setPop.classList.remove('open');
      });
      applyFontSize();
      setPop.querySelectorAll('[data-fs]').forEach(b => b.addEventListener('click', () => {
        state.fontSize = Math.min(1.5, Math.max(0.85,
          +(state.fontSize + (b.dataset.fs === '+' ? 0.1 : -0.1)).toFixed(2)));
        document.getElementById('fs-val').textContent = Math.round(state.fontSize * 100) + '%';
        applyFontSize();
      }));
      setPop.querySelectorAll('[data-pp]').forEach(b => b.addEventListener('click', () => {
        state.perPage = Math.min(items.length, Math.max(1,
          state.perPage + (b.dataset.pp === '+' ? 5 : -5)));
        state.page = 0;
        const newTotalPages = Math.ceil(items.length / state.perPage);
        renderQuestions(); renderPager(newTotalPages); renderNav(); renderMobDrawerGrid(); renderMobBottomNav(newTotalPages);
        document.getElementById('pp-val').textContent = state.perPage;
        refreshPageLabel(); refreshStats();
        document.getElementById('qa-settings-pop').classList.add('open');
      }));
    }

    // ===== Mobile bottom nav =====
    const mobPrev = document.getElementById('mob-prev-btn');
    const mobNext = document.getElementById('mob-next-btn');
    const mobOverview = document.getElementById('mob-overview-btn');
    if (mobPrev) mobPrev.addEventListener('click', () => {
      const curTotal = Math.ceil(items.length / state.perPage);
      if (state.page > 0) { state.page--; renderQuestions(); renderPager(curTotal); renderNav(); renderMobBottomNav(curTotal); renderMobDrawerGrid(); refreshPageLabel(); window.scrollTo({top:0,behavior:'smooth'}); }
    });
    if (mobNext) mobNext.addEventListener('click', () => {
      const curTotal = Math.ceil(items.length / state.perPage);
      if (state.page < curTotal-1) { state.page++; renderQuestions(); renderPager(curTotal); renderNav(); renderMobBottomNav(curTotal); renderMobDrawerGrid(); refreshPageLabel(); window.scrollTo({top:0,behavior:'smooth'}); }
      else confirmSubmit();
    });
    if (mobOverview) mobOverview.addEventListener('click', openMobDrawer);

    // ===== Mobile drawer close =====
    document.getElementById('mob-drawer-close')?.addEventListener('click', closeMobDrawer);
    document.getElementById('mob-drawer-overlay')?.addEventListener('click', closeMobDrawer);

    // ===== Exam Menu (mobile) =====
    document.getElementById('exam-menu-open-btn')?.addEventListener('click', () => {
      document.getElementById('exam-menu-drawer').classList.add('open');
      document.getElementById('exam-menu-overlay').classList.add('open');
    });
    const closeExamMenu = () => {
      document.getElementById('exam-menu-drawer').classList.remove('open');
      document.getElementById('exam-menu-overlay').classList.remove('open');
    };
    document.getElementById('exam-menu-overlay')?.addEventListener('click', closeExamMenu);
    document.getElementById('exam-menu-close')?.addEventListener('click', closeExamMenu);
    document.getElementById('em-fullscreen')?.addEventListener('click', () => { closeExamMenu(); enterFullscreen(); });
    document.getElementById('em-theme')?.addEventListener('click', () => { toggleTheme(); closeExamMenu(); });
    document.getElementById('em-pause')?.addEventListener('click', () => { closeExamMenu(); pauseQuiz(); });
    document.getElementById('em-submit')?.addEventListener('click', () => { closeExamMenu(); confirmSubmit(); });

    // Exam menu font size
    document.querySelectorAll('[data-efs]').forEach(b => b.addEventListener('click', () => {
      state.fontSize = Math.min(1.5, Math.max(0.85,
        +(state.fontSize + (b.dataset.efs === '+' ? 0.1 : -0.1)).toFixed(2)));
      const v = document.getElementById('em-fs-val');
      if (v) v.textContent = Math.round(state.fontSize*100) + '%';
      applyFontSize();
    }));
    // Exam menu per page
    document.querySelectorAll('[data-epp]').forEach(b => b.addEventListener('click', () => {
      state.perPage = Math.min(items.length, Math.max(1,
        state.perPage + (b.dataset.epp === '+' ? 5 : -5)));
      const v = document.getElementById('em-pp-val');
      if (v) v.textContent = state.perPage;
      state.page = 0;
      const newTotalPages = Math.ceil(items.length / state.perPage);
      renderQuestions(); renderPager(newTotalPages); renderNav(); renderMobDrawerGrid(); renderMobBottomNav(newTotalPages);
      refreshPageLabel(); refreshStats();
    }));

    applyFontSize();
  } // end renderQuiz

  /* ===== Mobile drawer helpers ===== */
  function openMobDrawer() {
    const overlay = document.getElementById('mob-drawer-overlay');
    const drawer = document.getElementById('mob-drawer');
    if (!overlay || !drawer) return;
    renderMobDrawerGrid();
    overlay.classList.add('open');
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeMobDrawer() {
    document.getElementById('mob-drawer-overlay')?.classList.remove('open');
    document.getElementById('mob-drawer')?.classList.remove('open');
    document.body.style.overflow = '';
  }
  function renderMobDrawerGrid() {
    const grid = document.getElementById('mob-drawer-grid');
    if (!grid) return;
    const c = counts();
    const sub = document.getElementById('mob-drawer-sub');
    if (sub) sub.textContent = `${c.answered}/${items.length} Attempted`;
    const mu = document.getElementById('mob-unanswered');
    const ma = document.getElementById('mob-answered');
    const ms = document.getElementById('mob-saved');
    if (mu) mu.textContent = c.unanswered;
    if (ma) ma.textContent = c.answered;
    if (ms) ms.textContent = c.marked;
    const totalPages = Math.ceil(items.length/state.perPage);
    grid.innerHTML = items.map((it,i) => {
      const r = state.responses[it.quiz.id];
      let cls = 'nav-cell';
      if (r.selected.length) cls += ' answered';
      if (r.bookmarked) cls += ' marked';
      if (Math.floor(i/state.perPage) === state.page) cls += ' current';
      return `<div class="${cls}" data-mob-nav="${i}">${i+1}</div>`;
    }).join('');
    grid.querySelectorAll('[data-mob-nav]').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.mobNav);
        state.page = Math.floor(i/state.perPage);
        closeMobDrawer();
        const curTotal = Math.ceil(items.length / state.perPage);
        renderQuestions(); renderPager(curTotal); renderNav(); renderMobBottomNav(curTotal); renderMobDrawerGrid();
        const card = document.querySelector(`[data-q="${items[i].quiz.id}"]`);
        if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
      });
    });
  }
  function renderMobBottomNav(totalPages) {
    const prev = document.getElementById('mob-prev-btn');
    const next = document.getElementById('mob-next-btn');
    if (prev) prev.disabled = state.page === 0;
    if (next) {
      const isLast = state.page >= totalPages - 1;
      next.textContent = isLast ? 'Submit' : 'Next ›';
      next.classList.toggle('accent', isLast);
    }
  }

  function applyFontSize() {
    const q = document.getElementById('questions');
    if (q) q.style.setProperty('--qa-fs', state.fontSize);
  }

  function refreshPageLabel() {
    const el = document.getElementById('page-label');
    if (!el) return;
    const totalPages = Math.ceil(items.length / state.perPage);
    el.textContent = `Page ${state.page + 1} / ${totalPages}`;
  }

  function refreshStats() {
    const c = counts();
    const set = (id,v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    set('t-answered', c.answered); set('t-saved', c.marked);
    const fill = document.querySelector('.progress-fill');
    if (fill) fill.style.width = `${(c.answered/items.length)*100}%`;
    renderNav();
    const ns = document.querySelectorAll('.nav-sum-num');
    if (ns.length >= 3) { ns[0].textContent = c.unanswered; ns[1].textContent = c.answered; ns[2].textContent = c.marked; }
    // Update mobile drawer stats if open
    renderMobDrawerGrid();
  }

  function renderQuestions() {
    const start = state.page * state.perPage;
    const pageItems = items.slice(start, start + state.perPage);
    const box = document.getElementById('questions');
    box.innerHTML = pageItems.map((it,i) => qCardHtml(it, start+i)).join('');
    pageItems.forEach((it) => wireCard(it));
    applyFontSize();
  }

  function wireCard(it) {
    const card = document.querySelector(`[data-q="${it.quiz.id}"]`);
    if (!card) return;
    card.querySelectorAll('.opt').forEach(o => o.addEventListener('click', () => chooseOption(it, o.dataset.opt)));
    card.querySelector('[data-bookmark]').addEventListener('click', () => toggleBookmark(it));
    card.querySelector('[data-report]').addEventListener('click', () => openReport(it));
    card.querySelector('[data-clear]')?.addEventListener('click', () => clearAnswer(it));
    const exBtn = card.querySelector('[data-explain]');
    if (exBtn) exBtn.addEventListener('click', () => {
      const ex = card.querySelector('.explain-box');
      const hidden = ex.style.display === 'none';
      ex.style.display = hidden ? 'block' : 'none';
      exBtn.textContent = hidden ? 'Hide explanation \u2304' : 'Show explanation \u203a';
    });
  }

  function qCardHtml(it, idx) {
    const q = it.quiz;
    const r = state.responses[q.id];
    const opts = (q.options || []).slice().sort((a,b) => (a.order||0)-(b.order||0));
    const revealed = state.mode === 'practice' && r.revealed;
    const optsHtml = opts.map((o,oi) => {
      let cls = 'opt';
      const isSel = r.selected.includes(o.id);
      if (revealed) {
        cls += ' locked';
        if (parseInt(o.is_correct)===1) cls += ' correct';
        else if (isSel) cls += ' wrong';
      } else if (isSel) {
        cls += ' selected';
      }
      return `<div class="${cls}" data-opt="${o.id}">
        <span class="opt-radio"></span>
        <span class="opt-letter">${LETTERS[oi]||''}.</span>
        <span class="opt-text">${escapeHtml(o.text)}</span>
      </div>`;
    }).join('');
    const explainHtml = (revealed && q.explanation) ? `
      <button class="explain-toggle" data-explain>Show explanation \u203a</button>
      <div class="explain-box md-body" style="display:none;">${renderRichText(q.explanation)}</div>` : '';
    return `<div class="qcard" data-q="${q.id}">
      <div class="qcard-head">
        <div class="qnum">Q.${idx+1}</div>
        <div class="qcard-actions">
          ${state.mode === 'test' && r.selected.length
            ? `<button class="clear-ans" data-clear>\u2715 Clear</button>` : ''}
          <button class="bookmark-icon-btn ${r.bookmarked?'on':''}" data-bookmark
                  title="${r.bookmarked?'Remove bookmark':'Save question'}"
                  aria-label="${r.bookmarked?'Remove bookmark':'Save question'}">
            <svg class="bm-svg" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
              <path d="M6 4.5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v17a.75.75 0 0 1-1.18.614L12 18.42l-4.82 3.694A.75.75 0 0 1 6 21.5v-17Z"
                    stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"
                    fill="${r.bookmarked ? 'currentColor' : 'none'}"/>
            </svg>
          </button>
          <button class="btn-report" data-report title="Report issue" aria-label="Report issue">⚑</button>
        </div>
      </div>
      <div class="qtext">${escapeHtml(q.question)}</div>
      <div class="opts">${optsHtml}</div>
      ${explainHtml}
    </div>`;
  }

  async function chooseOption(it, optId) {
    const q = it.quiz;
    const r = state.responses[q.id];
    if (state.mode === 'practice' && r.revealed) return;
    r.selected = [optId];

    if (isBookmarkPractice) {
      // No server attempt — compute correctness locally from the options
      // we already loaded (which include is_correct).
      const correctIds = (q.options || []).filter(o => +o.is_correct === 1).map(o => o.id);
      r.revealed = true;
      r.correct  = correctIds.length === 1 && correctIds[0] === optId;
    } else {
      try {
        const res = await quiz.answer({
          attemptId, quizId: q.id, selectedOptionIds: r.selected,
          enableNeg: state.negative,
        });
        if (state.mode === 'practice' && res.feedback) {
          r.revealed = true;
          r.correct = res.feedback.isCorrect;
          const correctIds = res.feedback.correctIds || [];
          (q.options || []).forEach(o => { o.is_correct = correctIds.includes(o.id) ? 1 : 0; });
          if (res.feedback.explanation) q.explanation = res.feedback.explanation;
        }
      } catch (e) { console.error('answer save failed', e); }
    }
    rerenderCard(it);
    refreshStats();
  }

  function rerenderCard(it) {
    const idx = items.indexOf(it);
    const old = document.querySelector(`[data-q="${it.quiz.id}"]`);
    if (!old) return;
    const wrap = document.createElement('div');
    wrap.innerHTML = qCardHtml(it, idx);
    old.replaceWith(wrap.firstElementChild);
    wireCard(it);
  }

  async function toggleBookmark(it) {
    const r = state.responses[it.quiz.id];
    const wasOn = r.bookmarked;
    // Optimistic: flip immediately, revert on error.
    r.bookmarked = !wasOn;
    rerenderCard(it);
    refreshStats();
    // animate the icon in
    const card = document.querySelector(`[data-q="${it.quiz.id}"]`);
    const btn  = card?.querySelector('[data-bookmark]');
    if (btn) { btn.classList.remove('bm-pulse'); void btn.offsetWidth; btn.classList.add('bm-pulse'); }
    try {
      const res = await bookmarks.toggle(it.quiz.id);
      r.bookmarked = !!res.bookmarked;
      rerenderCard(it);
      showToast(res.bookmarked ? 'Question saved' : 'Removed from saved');
    } catch (e) {
      r.bookmarked = wasOn;
      rerenderCard(it);
      showToast('Could not save: ' + (e.message || 'error'), true);
    }
  }

  function showToast(msg, isError = false) {
    let host = document.getElementById('qa-toast-host');
    if (!host) {
      host = document.createElement('div');
      host.id = 'qa-toast-host';
      host.className = 'qa-toast-host';
      document.body.appendChild(host);
    }
    const t = document.createElement('div');
    t.className = 'qa-toast' + (isError ? ' err' : '');
    t.textContent = msg;
    host.appendChild(t);
    requestAnimationFrame(() => t.classList.add('in'));
    setTimeout(() => {
      t.classList.remove('in');
      setTimeout(() => t.remove(), 250);
    }, 1700);
  }

  // Clear a selected answer — test mode only.
  function clearAnswer(it) {
    const r = state.responses[it.quiz.id];
    r.selected = [];
    rerenderCard(it);
    refreshStats();
    if (!isBookmarkPractice) {
      quiz.answer({ attemptId, quizId: it.quiz.id, selectedOptionIds: [] }).catch(()=>{});
    }
  }

  function renderPager(totalPages) {
    const pager = document.getElementById('pager');
    let html = `<button class="pager-num" data-pg="prev" ${state.page===0?'disabled':''}>\u2039 Prev</button>`;
    for (let p = 0; p < totalPages; p++)
      html += `<button class="pager-num ${p===state.page?'active':''}" data-pg="${p}">${p+1}</button>`;
    html += `<button class="pager-num" data-pg="next" ${state.page>=totalPages-1?'disabled':''}>Next \u203a</button>`;
    pager.innerHTML = html;
    pager.querySelectorAll('[data-pg]').forEach(b => {
      if (b.hasAttribute('disabled')) return;
      b.addEventListener('click', () => {
        if (b.dataset.pg === 'prev') state.page = Math.max(0, state.page-1);
        else if (b.dataset.pg === 'next') state.page = Math.min(totalPages-1, state.page+1);
        else state.page = parseInt(b.dataset.pg);
        renderQuestions(); renderPager(totalPages); renderNav(); refreshPageLabel();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function renderNav() {
    const grid = document.getElementById('nav-grid');
    if (!grid) return;
    grid.innerHTML = items.map((it,i) => {
      const r = state.responses[it.quiz.id];
      let cls = 'nav-cell';
      if (r.selected.length) cls += ' answered';
      if (r.bookmarked) cls += ' marked';
      if (Math.floor(i/state.perPage) === state.page) cls += ' current';
      return `<div class="${cls}" data-nav="${i}">${i+1}</div>`;
    }).join('');
    grid.querySelectorAll('[data-nav]').forEach(c => {
      c.addEventListener('click', () => {
        const i = parseInt(c.dataset.nav);
        const totalPages = Math.ceil(items.length/state.perPage);
        state.page = Math.floor(i/state.perPage);
        renderQuestions(); renderPager(totalPages); renderNav(); refreshPageLabel();
        const card = document.querySelector(`[data-q="${items[i].quiz.id}"]`);
        if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
      });
    });
  }

  function enterFullscreen() {
    state.fullscreen = true;
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    renderQuiz();
    if (state.deadline) startTimer();
  }
  function exitFullscreen() {
    state.fullscreen = false;
    if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    renderQuiz();
    if (state.deadline) startTimer();
  }
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && state.fullscreen) {
      state.fullscreen = false;
      if (state.started) { renderQuiz(); if (state.deadline) startTimer(); }
    }
  });

  function openReport(it) {
    const reasons = [
      ['INCORRECT_ANSWER','Incorrect answer'],
      ['TYPO_OR_GRAMMAR','Typo or grammar'],
      ['MISLEADING_QUESTION','Misleading question'],
      ['AMBIGUOUS_OPTIONS','Ambiguous options'],
      ['OUTDATED_INFORMATION','Outdated information'],
      ['INAPPROPRIATE_CONTENT','Inappropriate content'],
      ['OTHER','Other'],
    ];
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal-card">
      <h2>Report question</h2>
      <p style="color:var(--ink-muted); font-size:0.85rem;">${escapeHtml(it.quiz.question.slice(0,90))}${it.quiz.question.length>90?'\u2026':''}</p>
      <div class="field"><label>Reason</label>
        <select id="rp-reason">${reasons.map(r=>`<option value="${r[0]}">${r[1]}</option>`).join('')}</select></div>
      <div class="field"><label>Details</label>
        <textarea id="rp-desc" rows="3" placeholder="Describe the issue"></textarea></div>
      <div id="rp-alert"></div>
      <div class="row-end">
        <button class="btn" id="rp-cancel">Cancel</button>
        <button class="btn btn-accent" id="rp-submit">Submit report</button>
      </div>
    </div>`;
    document.body.appendChild(bg);
    const close = () => bg.remove();
    bg.addEventListener('click', e => { if (e.target === bg) close(); });
    bg.querySelector('#rp-cancel').addEventListener('click', close);
    bg.querySelector('#rp-submit').addEventListener('click', async () => {
      const reason = bg.querySelector('#rp-reason').value;
      const desc = bg.querySelector('#rp-desc').value.trim();
      const alert = bg.querySelector('#rp-alert');
      if (!desc) { alert.innerHTML = `<div class="alert alert-error">Please describe the issue.</div>`; return; }
      try {
        await reports.submit({ quizId: it.quiz.id, reason, description: desc });
        alert.innerHTML = `<div class="alert alert-success">Report submitted. Thank you.</div>`;
        setTimeout(close, 1300);
      } catch (e) {
        alert.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
      }
    });
  }

  function confirmSubmit() {
    const c = counts();
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal-card">
      <h2>${state.mode==='practice'?'Finish practice?':'Submit quiz?'}</h2>
      <p style="color:var(--ink-soft); font-size:0.9rem;">
        You've answered <strong>${c.answered}</strong> of <strong>${items.length}</strong>.
        ${c.unanswered ? `<strong>${c.unanswered}</strong> still unanswered.` : ''}
      </p>
      <p style="color:var(--ink-muted); font-size:0.84rem; margin-top:6px;">Once submitted, answers can't be changed.</p>
      <div class="row-end">
        <button class="btn" id="cs-cancel">Keep going</button>
        <button class="btn btn-accent" id="cs-go">${state.mode==='practice'?'Finish':'Submit'}</button>
      </div>
    </div>`;
    document.body.appendChild(bg);
    const close = () => bg.remove();
    bg.addEventListener('click', e => { if (e.target === bg) close(); });
    bg.querySelector('#cs-cancel').addEventListener('click', close);
    bg.querySelector('#cs-go').addEventListener('click', () => { close(); doSubmit(false); });
  }

  let submitting = false;
  async function doSubmit(timedOut) {
    if (submitting) return;
    submitting = true;
    if (timerInt) clearInterval(timerInt);
    // Bookmark Practice has no server attempt — just go back.
    if (isBookmarkPractice) {
      window.location.replace('bookmarks.html');
      return;
    }
    app.innerHTML = `<div class="loading-screen"><div class="spinner"></div><p>${timedOut?'Time up \u2014 submitting\u2026':'Submitting\u2026'}</p></div>`;
    try {
      await quiz.submit(attemptId, elapsedSeconds());
      window.location.replace(`results.html?attemptId=${encodeURIComponent(attemptId)}`);
    } catch (e) {
      app.innerHTML = `<div class="loading-screen"><div class="alert alert-error">${escapeHtml(e.message)}</div>
        <button class="btn btn-accent" onclick="location.reload()">Retry</button></div>`;
      submitting = false;
    }
  }

  /* ===== Boot ===== */
  // Resuming a paused attempt — show a "Paused" screen first, then enter the quiz.
  function enterResumedQuiz() {
    state.mode = resumeData.mode === 'PRACTICE' ? 'practice' : 'test';
    Object.entries(resumeData.responses || {}).forEach(([qid, r]) => {
      if (state.responses[qid]) {
        state.responses[qid].selected = Array.isArray(r.selectedOptionIds) ? r.selectedOptionIds : [];
        // (legacy isMarked no longer used; bookmarks are global, loaded separately)
      }
    });
    state.started      = true;
    state.priorElapsed = resumeData.elapsedSeconds || 0;
    state.runStartedAt = Date.now();
    if (state.mode === 'test' && durationMin > 0) {
      const remainingSec = Math.max(0, durationMin * 60 - state.priorElapsed);
      state.deadline = Date.now() + remainingSec * 1000;
    }
    renderQuiz();
    if (state.deadline) startTimer();
  }

  function renderResumeScreen() {
    const answered = Object.values(resumeData.responses || {}).filter(r => (r.selectedOptionIds||[]).length).length;
    const used = resumeData.elapsedSeconds || 0;
    const usedStr = `${String(Math.floor(used/60)).padStart(2,'0')}:${String(used%60).padStart(2,'0')}`;
    app.innerHTML = `
      <div class="prestart">
        <div class="prestart-card" style="text-align:center;">
          <div class="resume-icon">\u23f8</div>
          <h1>Test Paused</h1>
          <p class="ps-meta">${escapeHtml(setData.name)}</p>
          <div class="ps-summary" style="margin:16px 0;">
            ${answered} of ${items.length} answered${used ? `  \u00b7  ${usedStr} used` : ''}
          </div>
          <p style="color:var(--ink-muted); font-size:0.86rem; margin-bottom:16px;">
            Your answers are saved. ${resumeData.mode==='PRACTICE'?'':'The timer will continue from where it stopped.'}
          </p>
          <button class="btn btn-accent ps-start" id="resume-go">\u25b6 Resume Test</button>
        </div>
      </div>`;
    document.getElementById('resume-go').addEventListener('click', enterResumedQuiz);
  }

  if (existingAttemptId && resumeData) {
    renderResumeScreen();
  } else {
    renderPrestart();
  }
</script>

<!-- PWA install & service worker -->
<script type="module" src="/pwa/pwa.js">
  // ── Content Protection ───────────────────────────────────
  // Blocks casual copy/screenshot/print. Cannot stop DevTools or OS recording.

  // Block right-click
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Block keyboard shortcuts
  document.addEventListener('keydown', e => {
    const ctrl = e.ctrlKey || e.metaKey;
    const key  = (e.key || '').toLowerCase();
    // Ctrl+C/X/A/S/P/U + F12 + DevTools shortcuts
    if (ctrl && ['c','x','a','s','p','u'].includes(key)) {
      e.preventDefault(); e.stopPropagation(); return false;
    }
    if (key === 'f12' || key === 'printscreen' ||
        (ctrl && e.shiftKey && ['i','j','c','k'].includes(key))) {
      e.preventDefault(); e.stopPropagation(); return false;
    }
  }, true);

  // Block copy/cut events
  ['copy','cut'].forEach(ev =>
    document.addEventListener(ev, e => e.preventDefault())
  );

  // Block drag
  document.addEventListener('dragstart', e => e.preventDefault());

  // Blur on focus loss (screenshot deterrent)
  const _blur  = () => document.body.classList.add('content-blurred');
  const _focus = () => document.body.classList.remove('content-blurred');
  window.addEventListener('blur',  _blur);
  window.addEventListener('focus', _focus);
  document.addEventListener('visibilitychange', () =>
    document.hidden ? _blur() : _focus()
  );
</script>
</body>
