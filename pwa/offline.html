<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You're Offline — Quiznosis</title>
<link rel="manifest" href="../manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap');

:root {
  --paper: #F7F3EC;
  --ink:   #1A1814;
  --ink-soft: #4A453C;
  --ink-muted: #8C8473;
  --accent: #B8531C;
  --paper-edge: #E4DCCD;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
[data-theme="dark"] {
  --paper: #0E1626;
  --ink: #E8ECF4;
  --ink-soft: #AEB8CC;
  --ink-muted: #6B7794;
  --accent: #E0742F;
  --paper-edge: #2A3A5C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  padding-bottom: calc(32px + env(safe-area-inset-bottom));
  text-align: center;
  -webkit-font-smoothing: antialiased;
}
.icon-wrap {
  width: 88px; height: 88px;
  border-radius: 22px;
  background: var(--paper-edge);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.icon-wrap svg { color: var(--ink-muted); }
h1 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 400;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
p {
  color: var(--ink-soft);
  font-size: 1.05rem;
  line-height: 1.7;
  max-width: 340px;
  margin-bottom: 36px;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px 28px;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  text-decoration: none;
  transition: opacity .15s;
  margin-bottom: 12px;
  width: 100%;
  max-width: 280px;
  justify-content: center;
}
.btn:hover { opacity: .88; }
.btn-ghost {
  background: transparent;
  color: var(--ink-soft);
  border: 1.5px solid var(--paper-edge);
}
.tip {
  margin-top: 36px;
  font-size: 0.82rem;
  color: var(--ink-muted);
  max-width: 300px;
  line-height: 1.6;
  padding: 14px 18px;
  border-radius: 10px;
  background: var(--paper-edge);
  opacity: .7;
}
</style>
</head>
<body>
<script>
try {
  const t = localStorage.getItem('quiznosis-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
} catch {}
</script>

<div class="icon-wrap">
  <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 6s4-4 11-4 11 4 11 4"/>
    <path d="M1 18s4 4 11 4 11-4 11-4"/>
    <line x1="1" y1="6" x2="1" y2="18"/>
    <line x1="23" y1="6" x2="23" y2="18"/>
    <line x1="12" y1="2" x2="12" y2="22"/>
  </svg>
</div>

<h1>You're offline</h1>
<p>No internet connection detected. Check your Wi-Fi or mobile data and try again.</p>

<button class="btn" onclick="location.reload()">
  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.34"/></svg>
  Try again
</button>
<a href="../index.html" class="btn btn-ghost">Go to Home</a>

<div class="tip">
  💡 Some pages you've visited before may still work offline from cache.
</div>
</body>
</html>
